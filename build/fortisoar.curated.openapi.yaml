      description: '**Live-verified** (`apikey: OK` - `jwt: OK`, 2026-05-10)


        **See:** [Query reference](#description/query-reference)


        Full filter / aggregation grammar over a single collection. Grammar: 13 leaf operators, AND/OR nesting, sort, aggregates
        (`count`, `groupby`, `sum`, `avg`, `min`, `max`, ...).


        Pagination is via query string (`?$limit=&$page=`) - body fields named `page`/`pageSize`/`limit` are silently ignored.
        Always set a stable `sort` so successive pages don''t reshuffle.'
      parameters:
      - name: $limit
        in: query
        schema:
          type: integer
          default: 30
          maximum: 5000
        example: 30
      - name: $page
        in: query
        schema:
          type: integer
          default: 1
        example: 1
      - name: $search
        in: query
        description: Combines with body filters as AND.
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryBody'
            examples:
              basic:
                summary: Basic AND filter
                value:
                  logic: AND
                  filters:
                  - field: severity.itemValue
                    operator: in
                    value:
                    - High
                    - Critical
                  - field: status.itemValue
                    operator: neq
                    value: Closed
                  sort:
                  - field: createDate
                    direction: desc
              nested-or:
                summary: Nested AND/OR with date window
                value:
                  logic: AND
                  filters:
                  - field: createDate
                    operator: gte
                    value: 1736380800
                    type: datetime
                  - field: createDate
                    operator: lte
                    value: 1738972800
                    type: datetime
                  - logic: OR
                    filters:
                    - field: severity.itemValue
                      operator: eq
                      value: Critical
                    - field: tags.itemValue
                      operator: in
                      value:
                      - high-fidelity
                      - exec-impersonation
                  sort:
                  - field: modifyDate
                    direction: desc
              aggregate-groupby:
                summary: 'Aggregation: count by severity'
                value:
                  logic: AND
                  filters:
                  - field: createDate
                    operator: gte
                    value: 1735689600
                    type: datetime
                  aggregates:
                  - operator: groupby
                    field: severity.itemValue
                    alias: severity
                  - operator: count

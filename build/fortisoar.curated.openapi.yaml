paths:
  /auth/authenticate:
    post:
      tags:
      - Authentication
      summary: Issue a JWT bearer token
      description: '**See:** [Authentication](#description/authentication)


        Token-based authentication. Returns a JWT for use as `Authorization: Bearer <token>` on subsequent requests. Default
        TTL is ~30 minutes; long-running clients should re-authenticate on 401.


        **Note:** The path is `/auth/authenticate` (no `/api` prefix). The PDF references `/api/auth/token` as the canonical
        endpoint, but on current builds it returns 403 even with a valid bearer; use this one.'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
            example:
              credentials:
                loginid: csadmin
                password: <password>
      responses:
        '200':
          description: JWT issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9...
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example: &id001
                '@context': /api/3/contexts/Error
                '@type': Error
                hydra:title: An error occurred
                hydra:description: Validation failed.
  /api/3/logout:
    post:
      tags:
      - Authentication
      summary: Server-side session invalidation
      description: Invalidates the bearer token server-side, complementing JWT expiry. Optional - JWTs expire on their own.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
            example: {}
      responses:
        '204':
          description: Logged out.
  /api/auth/cluster/health:
    get:
      tags:
      - System
      summary: HA cluster health
      description: '**See:** [Authentication](#description/authentication) (JWT-only on tested boxes)


        Returns one object per cluster node with 17 fields (status, services, connectivity, cpu, memory, disk, replication_stat,
        workflow, ...).'
      responses:
        '200':
          description: Per-node health array.
          content:
            application/json:
              example:
              - node: fsr-1
                status: Healthy
                role: Primary
                connectivity:
                  primary: ok
                  secondary: ok
                services:
                  messageQueue: running
                  appServer: running
                  search: running
                  workflow: running
                  integrations: running
                  auth: running
                cpu:
                  usage_pct: 18.4
                  load_avg_1m: 0.62
                memory:
                  total_mb: 32768
                  used_mb: 18204
                  used_pct: 55.6
                disk:
                - mountpoint: /
                  used_pct: 41.2
                  free_gb: 142.8
                - mountpoint: /var
                  used_pct: 67.5
                  free_gb: 51.4
                replication_stat:
                  state: Streaming
                  lag_seconds: 0
                workflow:
                  queue_depth: 0
                  active_runs: 3
                  failed_24h: 1
                lastCheckedAt: 1736380800
              - '... <2 more nodes truncated>'
  /api/auth/license:
    get:
      tags:
      - System
      summary: License information
      description: '**See:** [Authentication](#description/authentication)


        *Heads-up:* JWT-only on 7.6.x (API key returns 403). Some builds also return a generic 400 on the JWT path - the endpoint
        is wired through the auth standalone service and is sensitive to backend-side state. Skip if your monitoring doesn''t
        strictly need it.'
      responses:
        '200':
          description: License details.
          content:
            application/json:
              example:
                uuid: fsr-license-9876
                serialNumber: FSRVMS0000000001
                edition: Enterprise
                tier: Premium
                issueDate: 1727740800
                expiryDate: 1759276800
                users:
                  licensed: 25
                  active: 14
                agents:
                  licensed: 50
                  active: 12
                features:
                - MSSP
                - SOAR
                - TI
                - SOC
                - AGENTS
  /api/version:
    get:
      tags:
      - System
      summary: Build version
      description: '**Public, no auth required.** Cheap unauthenticated probe.'
      security: []
      responses:
        '200':
          description: Version string.
          content:
            application/json:
              example:
                version: 7.6.5-5662

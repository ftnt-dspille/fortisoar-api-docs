openapi: 3.1.0
info:
  title: FortiSOAR API
  version: 0.1.0
  summary: Hand-shaped subset of the FortiSOAR REST API.
  description: "A hand-shaped OpenAPI 3.1 reference for the FortiSOAR REST API.\n\n> **Official docs:** [FortiSOAR API Guide\
    \ on docs.fortinet.com](https://docs.fortinet.com/document/fortisoar/latest/api-guide/846127). This reference is **not**\
    \ official Fortinet documentation - it's a community project. Consult the official guide for the authoritative surface;\
    \ use this site for endpoints that the guide doesn't cover or where live-verified shapes are useful.\n\n> **Disclaimer.**\
    \ This reference is a community effort and is **not exhaustive**. Coverage is the surface I use day-to-day; many operations\
    \ are still missing. Operations stamped with **Live-verified** at the top of the page were exercised end-to-end against\
    \ a real FortiSOAR. Anything without that stamp is documented from the API guide and DB introspection only - request/response\
    \ shapes are best-effort, not guaranteed to be correct. Always validate against your own appliance before relying on it.\n\
    >\n> **What the Live-verified line tells you.** It looks like: **Live-verified** (`apikey: OK` - `jwt: OK`, YYYY-MM-DD).\n\
    >\n> - `apikey: OK` / `jwt: OK` - the verifier called the operation with that auth mode and got a 2xx response. Captured\
    \ (sanitized) responses are folded into the `200` example.\n> - `apikey: 401` (or `403`, `404`, ...) - that auth mode\
    \ returned the listed status code. Some endpoints only accept one auth mode; that's fine, just means the other won't work\
    \ for you either.\n> - Trailing date - when the verifier last hit this op.\n> - No Live-verified line at all - never executed\
    \ by the verifier. Treat as documentation-only.\n\nSchemas (`Alert`, `RecordLog`, ...) are validated against captured\
    \ responses where present. Run `python src/verify_curated.py` against your FortiSOAR (creds in `.env`) to refresh the\
    \ verification report.\n\n## Concepts\n\nResponses follow the **JSON-LD + Hydra** convention. In practice that means every\
    \ record has an `@id` URL you can copy and reuse as a reference, plus an `@type` (the module name) and `@context` (model\
    \ URL). List endpoints wrap their results in a `hydra:member` envelope \u2014 see [Pagination & response shape](#description/pagination-response-shape).\n\
    \n- **IRI** \u2014 a relative URL like `/api/3/alerts/<uuid>`. Treat it as a foreign-key pointer: wherever JSON references\
    \ another record, that's what you'll see. The server generates `@id` on insert; clients should not send it.\n- **UUID**\
    \ - 36-character hex w/ hyphens. Optional on POST: send your own to retain it for cross-system reference, or omit and\
    \ read it back from the response IRI.\n- **CamelCase** - every key is camelCase (`sourceId`, `dueDate`, `hydra:variableRepresentation`).\
    \ Use the same convention for any custom modules.\n- **Picklist values are IRIs from 7.5.0+.** Posting `\"severity\":\
    \ \"High\"` is rejected; you must post `\"severity\": \"/api/3/picklists/<value-uuid>\"`. Fetch the value's IRI from `GET\
    \ /api/3/picklists?listName.name=AlertSeverity&itemValue=High`. Bulk-feed paths are an exception (no validation).\n- **Trigger-bypass\
    \ semantics.** `POST /api/ingest-feeds/*` and `POST /api/insert-feeds/*` skip on-create playbook triggers (intentional,\
    \ for high-volume feeds). `POST /api/3/insert/*` (with optional `__bulk: true` for batching) does **not** skip triggers.\n\
    \n## Authentication\n\nThree documented methods; only two are recommended.\n\n| Method | Header | When to use |\n|---|---|---|\n\
    | **API key** (recommended) | `Authorization: API-KEY <key>` (note literal space) | Appliances, scheduled jobs, long-lived\
    \ integrations. Mint via Settings -> Security Management -> Access Keys. |\n| **Bearer JWT** | `Authorization: Bearer\
    \ <jwt>` | Short-lived / interactive use. Obtain from `POST /auth/authenticate`. Default TTL ~30 min; re-auth on 401.\
    \ |\n| HMAC | (legacy) | Documented in the public PDF for completeness. Out of scope here - most clients should use API\
    \ key. |\n\nSome endpoints accept only one method. The **`Live-verified`** badge on each op shows per-auth status; `apikey:\
    \ 403` next to `jwt: 200` means that endpoint is JWT-only on the box we tested. Examples observed: `/api/auth/cluster/health`\
    \ requires JWT; `/api/auth/license` is JWT-only; most CRUD works with both.\n\nThe `/api/version` and `/api/public/license`\
    \ endpoints are **public** (no auth required).\n\n## Pagination & response shape\n\nEvery `GET /api/3/<plural>` returns\
    \ a Hydra paged collection:\n\n```json\n{\n  \"@context\": \"/api/3/contexts/Alert\",\n  \"@id\": \"/api/3/alerts\",\n\
    \  \"@type\": \"hydra:PagedCollection\",\n  \"hydra:totalItems\": 1247,\n  \"hydra:itemsPerPage\": 30,\n  \"hydra:firstPage\"\
    : \"/api/3/alerts\",\n  \"hydra:nextPage\":  \"/api/3/alerts?$page=2\",\n  \"hydra:lastPage\":  \"/api/3/alerts?$page=42\"\
    ,\n  \"hydra:member\": [ ... ],\n  \"hydra:search\":  { \"@type\": \"hydra:IriTemplate\", \"hydra:template\": \"/api/3/alerts{?}\"\
    , \"hydra:mapping\": [] }\n}\n```\n\n`hydra:member` is the array. The rest is navigation/metadata.\n\n### Reserved query\
    \ parameters\n\n| Param | Default | Notes |\n|---|---|---|\n| `$limit` | 30 | Max **5000** (server-enforced cap). |\n\
    | `$page` | 1 | 1-indexed. |\n| `$orderby` | - | `field` or `-field` for desc. Body `sort[]` is the equivalent on `/api/query`.\
    \ |\n| `$relationships` | `false` | Controls whether linked modules appear in the response. When `true`, related collections\
    \ (e.g. an alert's `tasks`, `indicators`, `assets`) are populated. When `false`, those collections are **left out entirely**\
    \ \u2014 not returned as empty arrays. Single-value links (`severity`, `status`, `createUser`, etc.) are always returned\
    \ as full record objects regardless of this flag. |\n| `$export` | `false` | Strips identity fields so the result re-imports\
    \ cleanly. Used by export UI. |\n| `$partial` | `false` | When `true`, `hydra:totalItems` is omitted (skips `COUNT(*)`).\
    \ Useful when paging blindly. |\n| `$search` | - | See [Query reference](#description/query-reference) - top-level token,\
    \ distinct from the per-field `search` operator. |\n| `$fields` | - | **Power user** - `?$fields=uuid,name,steps` returns\
    \ only those columns. Big response-size win on bulk pulls. |\n\n### Power-user URL filtering\n\nThese work on every `/api/3/<plural>`\
    \ endpoint and cover ~90% of what `/api/query/*` does without a body:\n\n- **Nested dot notation** traverses relationships\
    \ at any depth: `?triggerStep.stepType.name=cybersponse.post_create&triggerStep.arguments.resources$exists=alerts&isActive=true`.\
    \ Either `.` or `__` works (`steps__stepType__name` \u2261 `steps.stepType.name`).\n- **Operators** are appended with\
    \ `$`: `?eventCount$gte=10&eventCount$lt=20`, `?status__itemValue$in=Open|Resolved|InProgress`. Default operator (no `$op`\
    \ suffix) is `eq`.\n- **Existence on collections**: `<rel>.<arrayField>$exists=value` - \"find playbooks whose trigger\
    \ covers this module\". Example: `triggerStep.arguments.resources$exists=alerts`.\n- **Multiple parts are ANDed.** No\
    \ way to OR via URL params - repeating a key (`?field=A&field=B`) returns `400 Bad Request`. Use the body endpoint for\
    \ OR.\n\n## Query reference\n\nThree distinct query surfaces - pick by use case:\n\n| Surface | Endpoint | Filter | Aggregations\
    \ | Best for |\n|---|---|---|---|---|\n| URL-param | `GET /api/3/<resource>?...` | single AND chain | none | Simple lookups;\
    \ everything ANDs together |\n| Body | `POST /api/query/<resource>` | nested AND/OR groups | yes | Anything non-trivial;\
    \ complex filters; counts |\n| Global | `POST /api/search` | keyword `q` | none | Cross-module text search (Elasticsearch)\
    \ |\n\n### Request body shape\n\n```jsonc\n{\n  \"logic\": \"AND\" | \"OR\",\n  \"filters\": [\n    { \"field\": \"<path>\"\
    , \"operator\": \"<op>\", \"value\": <val>, \"type\": \"<type>\"? },   // leaf\n    { \"logic\": \"AND\" | \"OR\", \"\
    filters\": [ ... ] }                                    // nested group\n  ],\n  \"sort\":       [ { \"field\": \"<path>\"\
    , \"direction\": \"asc\" | \"desc\" } ],\n  \"aggregates\": [ { \"operator\": \"<op>\", \"field\": \"<path>\", \"alias\"\
    : \"<name>\" } ]\n}\n```\n\nPagination + `$search` ride on the **query string** (`?$limit=30&$page=2&$search=fortinet`);\
    \ body fields named `page`/`pageSize`/`limit` are silently ignored.\n\n### Field operators\n\n| Operator | Behavior |\
    \ Notes |\n|---|---|---|\n| `eq` | exact equality | Default if `operator` omitted. For association IRIs, the UUID is extracted\
    \ before comparison. |\n| `neq` | exact inequality | |\n| `lt`, `lte`, `gt`, `gte` | numeric / date comparisons | With\
    \ `type: \"datetime\"` + a numeric value, the value is treated as epoch. |\n| `in` | match any of N | Accepts `[...]`\
    \ array or a `\\|`-delimited string. **Lowercases** string values. Association IRIs -> UUIDs. |\n| `nin` | NOT IN | Generated\
    \ SQL is `NOT IN (...) OR field IS NULL` - **includes NULL rows by design**. |\n| `like` | SQL LIKE | **Lowercases** the\
    \ value; matches against `LOWER(field)` for non-JSON columns. Wildcards `%` `_`. |\n| `notlike` | SQL NOT LIKE | Excluded\
    \ from `ALL_OPERATORS` whitelist - works in practice but may be UI-hidden / pending deprecation. |\n| `contains` | JSON\
    \ containment | For `jsonb` columns. |\n| `exists` | JSON path existence | Undocumented in the public guide; works against\
    \ JSON-typed columns. |\n| `isnull` | `true` -> IS NULL, `false` -> IS NOT NULL | |\n| `search` | per-field full-text\
    \ | **Source-only.** Declared in the parser but every wire form returns 500. Use `$search` instead. |\n\n### Aggregations\n\
    \n| Operator | DQL | Notes |\n|---|---|---|\n| `fields`, `select` | `SELECT field AS alias` | Selecting raw fields; **does\
    \ not flip query into aggregate mode**. |\n| `count` | `COUNT(field)` | `field: \"*\"` -> root alias. |\n| `countdistinct`\
    \ | `COUNT(DISTINCT field)` | Omitted from `ALL_OPERATORS` whitelist but works at builder layer. |\n| `groupby` | adds\
    \ `GROUP BY field` | Pair with a metric (`count`/`sum`/...). |\n| `distinct` | `DISTINCT field` | |\n| `sum`, `max`, `min`\
    \ | corresponding SQL | |\n| `avg`, `median` | corresponding SQL | Constants exist; **omitted from whitelist** (still\
    \ emit). |\n\nA query is treated as aggregate iff `aggregates[]` contains anything other than `fields`/`select`. That\
    \ changes the response shape - `hydra:member` becomes aggregate rows instead of records.\n\n### Field projection with\
    \ selectFields and ignoreFields\n\nBody-level allow/deny lists for the response shape. Lighter than aggregations - they\
    \ don't flip the query into aggregate mode, they just shape what each `hydra:member` record contains.\n\n```jsonc\n{\n\
    \  \"logic\": \"AND\",\n  \"filters\": [ { \"field\": \"status.itemValue\", \"operator\": \"eq\", \"value\": \"Open\"\
    \ } ],\n  \"__selectFields\": [\"id\", \"uuid\", \"name\", \"severity\", \"status\", \"createDate\"]\n}\n```\n\n```jsonc\n\
    {\n  \"logic\": \"AND\",\n  \"filters\": [ { \"field\": \"createDate\", \"operator\": \"gte\", \"value\": 1735689600,\
    \ \"type\": \"datetime\" } ],\n  \"__ignoreFields\": [\"createDate\", \"createUser\", \"modifyDate\", \"modifyUser\",\
    \ \"@settings\"]\n}\n```\n\nUse one or the other, not both. Common for **bulk export** (drop audit/ownership fields) and\
    \ **bulk dashboards** (only fetch what the tile renders). Equivalent to the URL-side `$fields` projection on `GET /api/3/<resource>`\
    \ but available on the body grammar where you also have OR / nested filters / aggregates.\n\n### Top-level search URL\
    \ parameter\n\nAvailable on **both** `GET /api/3/<resource>` and `POST /api/query/<resource>`:\n\n```\nGET  /api/3/workflows?$search=fortinet\n\
    POST /api/query/workflows?$search=fortinet  + body filters\n```\n\n- Case-insensitive substring across the entity's \"\
    searchable fields\" (per-entity set).\n- Tokenized when multi-word.\n- AND-combinable with body filters / URL filters.\n\
    - No min-length gate (`$search=a` happily matches).\n- **Top-level only.** Putting `{\"$search\": \"x\"}` inside the body's\
    \ `filters[]` is silently ignored.\n\n### Elasticsearch global search endpoint\n\nDifferent beast. Use for \"global search\
    \ bar\" UX; for deterministic per-entity filtering use `/api/query` instead.\n\n```jsonc\n{\n  \"q\": \"fortinet phishing\"\
    ,         // **min 3 chars** enforced\n  \"index\": [\"alerts\", \"incidents\"], // required, non-empty\n  \"size\": 30,\
    \ \"offset\": 0,\n  \"searchType\": \"_default\",\n  \"modifyDateGte\": 0, \"modifyDateLte\": 0\n}\n```\n\n- Multi-index\
    \ in one call.\n- Team / RBAC scoped automatically (joins `accessibleTeamIris`).\n- 3-character minimum enforced server-side.\n\
    - `400 TypeError` from this route means the downstream `cyops-search` MQ consumer is unhealthy, not that the body shape\
    \ is wrong. Check `systemctl status cyops-search` on the appliance.\n\n### Persisted queries\n\nPersisted queries are\
    \ stored in `/api/3/queries` (ad-hoc), `/api/3/system_queries` (system-owned), and `/api/3/user_queries` (user-saved).\
    \ They're *inputs* you copy into the body of `POST /api/query/<resourceShortName>` - there is no separate execute route\
    \ that takes a query ID. To run a saved query, GET the query record and POST its body to `/api/query/<shortName>`. (`POST\
    \ /api/query/<shortName>/<id>/<field>` is a related but distinct endpoint - relationship-walk on a record, not query execute.)\n\
    \n## Audit gateway quirks\n\n`POST /api/gateway/audit/activities` is the workhorse for SIEM-style log pulls. It has nine\
    \ traps worth knowing about up-front.\n\n1. **Slice pagination, no totals.** The response has no `totalElements` / `totalPages`\
    \ / `last` (intentional - the repository skips `COUNT(*)` for performance). Detect end-of-data via empty `content` or\
    \ `content.length < limit`. For totals, call the sibling `/count` endpoint.\n2. **Default `limit` is 10 if you misname\
    \ the param.** Conventions like `size`, `pageSize`, `max` are silently dropped and the server applies its default of 10.\
    \ Only `limit` works.\n3. **`filterParams: { ... }` wrapper is silently ignored.** Filters must be at the top level of\
    \ the body; anything nested under `filterParams` is dropped.\n4. **Arrays don't work for any filter.** `{\"operation\"\
    : [\"Login Success\"]}` (single-element array) silently no-ops. `{\"operation\": [\"A\", \"B\"]}` returns 400. To get\
    \ multiple ops server-side, make multiple calls and merge.\n5. **`user` is not filterable, only `userId`.** `{\"user\"\
    : \"Jane Doe\"}` is silently ignored. `{\"userId\": \"jdoe\"}` works.\n6. **`search` is brittle.** `{\"search\": \"Login\"\
    }` returned 0 hits even with many \"Login\" titles in the data. Probably searches a specific subset of fields with prefix-only\
    \ matching. Don't rely on it.\n7. **No server-side sort control.** Records arrive `id DESC` (newest first). No `sort`\
    \ param honored. Sort client-side if you need anything else.\n8. **`displayName` arrives dirty.** Some records have extra\
    \ whitespace, embedded UUIDs, even unrelated text from other fields. Sanitize on read.\n9. **JWT lifetime is short.**\
    \ Default ~30 min; long-running syncs need to re-auth on 401 or use a service-account token with extended TTL.\n\nThe\
    \ 45-value `operation` enum is in the `AuditOperation` schema; fetch it dynamically from `GET /api/gateway/audit/operations`.\n\
    \n## Workflows & triggers\n\nRun control lives under `/api/wf/*`. The endpoints below cover the most common control flows;\
    \ less-used ones (`historical-workflows/*`, `expressions/*`, `dynamic-variable/*`) are tracked as a future expansion.\n\
    \n- `POST /api/wf/api/workflows/{pk}/start/` - manually queue.\n- `POST /api/wf/api/workflows/{pk}/resume/` - resume a\
    \ `paused` run. **Not for `awaiting`** - that uses manual-input PUT.\n- `POST /api/wf/api/workflows/{pk}/retry/` - retry\
    \ a failed run from the failed step.\n- `POST /api/wf/api/workflows/{pk}/approval/` - approval-step shortcut.\n\n**Decoy\
    \ alert:** `POST /api/wf/api/workflows/{pk}/wfinput_resume/` exists and looks canonical, but the actual resume path for\
    \ `awaiting` runs is **`PUT /api/wf/api/manual-wf-input/{pk}/`** with body `{workflow: <int_pk>, input: <dict>, type,\
    \ step_id}`. Don't use `wfinput_resume`.\n\n### Triggers\n\nThree ways to fire a playbook from outside:\n\n- **`POST /api/triggers/1/{name}`**\
    \ - hits a Custom API Endpoint trigger (named via the trigger config). Allows alternate auth (Basic / no-auth) for external\
    \ webhooks, by design - keeps the core API token-locked while letting webhook senders use simpler auth.\n- **`POST /api/triggers/1/deferred/{name}`**\
    \ - same as above but async (returns 202).\n- **`POST /api/triggers/1/notrigger/{workflowId}`** - direct execution of\
    \ a workflow by UUID, bypassing trigger conditions. Useful for testing.\n\nThe notifier service has additional fan-out\
    \ via STOMP-over-WebSocket at `/websocket/` (server pushes workflow updates on `/topic/workflows/`). No REST surface;\
    \ out of scope here.\n\n### Triggering a playbook with an API key and tracking the task\n\nWorked end-to-end flow against\
    \ a Custom API Endpoint trigger: fire the playbook, capture the `task_id`, poll the workflow log until it reaches a terminal\
    \ state, then fetch full execution details. Same pattern works for `deferred/` (async) and `notrigger/<workflowId>` -\
    \ only the trigger URL changes.\n\n**1. Fire the trigger.** `POST /api/triggers/1/<endpoint-name>` with the body the playbook\
    \ expects. Auth header is `Authorization: API-KEY <key>` (literal space, not a colon). The response always contains a\
    \ `task_id` - that is the handle you track, not the workflow IRI.\n\n```python\nimport requests\n\nBASE_URL = \"https://fortisoar.example.com\"\
    \nHEADERS = {\n    \"Authorization\": f\"API-KEY {API_KEY}\",\n    \"Content-Type\": \"application/json\",\n}\n\nresp\
    \ = requests.post(\n    f\"{BASE_URL}/api/triggers/1/lookup_ip\",\n    headers=HEADERS,\n    json={\"value\": \"1.1.1.2\"\
    },\n    verify=False,\n)\nresp.raise_for_status()\ntask_id = resp.json().get(\"task_id\") or resp.json()[\"data\"][\"\
    task_id\"]\n```\n\nThe `task_id` field sometimes sits at the top level and sometimes inside `data` depending on the trigger\
    \ flavor - check both. Synchronous triggers return 200; `deferred/` returns 202 with the same envelope.\n\n**2. Poll the\
    \ workflow log by `task_id`.** The workflows endpoint indexes runs by `task_id` and returns the parent run when filtered\
    \ with `parent_wf__isnull=True` (skips child sub-workflows). Order by `-modified` and take the first hit.\n\n```python\n\
    url = (\n    f\"{BASE_URL}/api/wf/api/workflows/\"\n    f\"?format=json&limit=1&offset=0&ordering=-modified\"\n    f\"\
    &task_id={task_id}&parent_wf__isnull=True\"\n)\nlog = requests.get(url, headers=HEADERS, verify=False).json()[\"hydra:member\"\
    ][0]\nstatus = log[\"status\"]   # pending | running | finished | failed | terminated | skipped\nworkflow_id = log[\"\
    @id\"].rstrip(\"/\").split(\"/\")[-1]\n```\n\nTerminal states are **`finished`**, **`failed`**, **`terminated`**, **`skipped`**.\
    \ Anything else (`pending`, `running`, `awaiting`, ...) means keep polling. An empty `hydra:member` array right after\
    \ trigger is normal - the log row is written on first executor pickup, not on trigger receipt.\n\n**3. Fetch full execution\
    \ details.** Once terminal, hit the workflow record directly:\n\n```python\ndetails = requests.get(\n    f\"{BASE_URL}/api/wf/api/workflows/{workflow_id}/?format=json\"\
    ,\n    headers=HEADERS, verify=False,\n).json()\n```\n\n- **`details[\"result\"]`** - the playbook's final output (the\
    \ output of the last executed step). This is what 90% of callers want.\n- **`details[\"name\"]`** - playbook name.\n-\
    \ **`details[\"status\"]`** - same terminal status as the log row.\n- **Per-step outputs** - the workflow record also\
    \ carries a step-execution array (field name varies by FortiSOAR version); each entry has a step name + its output. Useful\
    \ when you need an intermediate step's value rather than the last one. Inspect `details.keys()` on your appliance to confirm\
    \ the field name before relying on it.\n\nIf the last step produced no output, `result` is `null` even on `status: finished`\
    \ - that's expected, not an error.\n\n**Gotchas observed in practice:**\n\n- **Poll interval.** 5 s is a sensible floor;\
    \ the executor batches log writes. Tighter polling just multiplies the request count without buying any latency.\n- **No\
    \ `task_id` in response.** Usually means the trigger name is wrong (404 was masked by a redirect) or the playbook is inactive.\
    \ The endpoint returns 200 with an empty body in some edge cases - always check before subscripting.\n- **`parent_wf__isnull=True`\
    \ is required** for playbooks that fan out via `Execute Sub Playbook`. Without it the first match may be a child run that\
    \ finishes before the parent.\n- **API-KEY vs Bearer.** API-KEY tokens don't expire, so they're the right choice for long-running\
    \ tracker scripts; JWTs typically die after ~30 minutes mid-poll.\n\n## Imports & exports\n\nThere are **two import paths**\
    \ with different semantics; the wrong choice silently fails.\n\n| Endpoint | Body | Behavior |\n|---|---|---|\n| `POST\
    \ /api/3/workflow_collections` | unwrapped collection (`{name, description, visible, uuid, workflows: [...]}`) | strict\
    \ create. **409 `UniqueConstraintViolationException`** on UUID collision. |\n| `POST /api/3/import_jobs` | export-style\
    \ envelope (`{type, data, macros, exported_tags}`) | **does not import the JSON inline** - see gotcha below. |\n\n###\
    \ The import_jobs gotcha\n\nThe import-job record has fields `file`, `status`, `options`, `type` - and **no `data` field**.\
    \ The server's request decoder silently drops unknown keys and accepts your payload's outer `type` (e.g. `\"workflow_collections\"\
    `), overriding the expected `\"Import Wizard\"` value. Result: 200 OK, no actual import.\n\n**Real flow:**\n\n1. `POST\
    \ /api/3/files/` (multipart) - upload the JSON blob.\n2. `POST /api/3/import_jobs` with `{file: \"/api/3/files/<uuid>\"\
    , type: \"Import Wizard\", options: {...}}`.\n3. The import worker picks up the job and applies the file.\n\n### Default\
    \ mergeType is merge_append\n\nA naive re-POST to `import_jobs` returns 200 but **silently skips** any playbook whose\
    \ UUID *or* `(name, collection)` matches an existing record. For dev-loop overwrite semantics, attach explicit options:\n\
    \n```json\n{\n  \"type\": \"Import Wizard\",\n  \"file\": \"/api/3/files/<uuid>\",\n  \"options\": {\n    \"playbooks\"\
    : {\n      \"include\": true,\n      \"values\": [\n        {\"uuid\": \"<col-uuid>\", \"name\": \"<col-name>\",\n   \
    \      \"include\": true, \"mergeType\": \"merge_replace\",\n         \"includeSchedules\": true}\n      ]\n    }\n  }\n\
    }\n```\n\n| `mergeType` | Collection-level | Workflow-level |\n|---|---|---|\n| `rename` | suffix ` (1)`, ` (2)`... until\
    \ unique; new UUID | re-rolls UUIDs |\n| `replace` | DELETE + insert | (whole collection replaced) |\n| `merge_replace`\
    \ | keep collection, replace workflows | UUID-or-name match -> DELETE -> insert new |\n| `merge_append` (default) | keep\
    \ collection, add new | UUID-or-name match -> skip incoming |\n\n### Entity uniqueness constraints\n\n| Entity | Constraint\
    \ | Notes |\n|---|---|---|\n| `WorkflowCollection.name` | `nullable=false`, **`unique=true`** instance-wide | rename or\
    \ DELETE the existing one before re-import. |\n| `Workflow` | `UniqueConstraint(columns={\"name\", \"collection\"})` |\
    \ unique **per collection**, not globally. |\n| `Workflow.aliasName` | `nullable=true`, no unique constraint | safe to\
    \ emit `null`. |\n| `WorkflowStep.name` | `nullable=false`, length 255 | required. |\n| `WorkflowRoute.sourceStep` / `targetStep`\
    \ | FK `nullable=false`, `onDelete=\"CASCADE\"` | both required; deleting a step cascades its routes. |\n\n### Cross-collection\
    \ UUID collision\n\nIf a workflow UUID matches one already in a *different* collection, FortiSOAR re-rolls a fresh UUID\
    \ for the workflow **and all its steps**. Deterministic UUIDs are stable **within a collection** only, not portable across.\n"
servers:
- url: https://{host}
  variables:
    host:
      default: fortisoar.example.com
security:
- apiKeyAuth: []
- bearerJwt: []
tags:
- name: Authentication
  description: Sign in, sign out, and look up the current user / actor.
- name: System
  description: Build version, license info, HA cluster health, feature flags, and cache invalidation. The version + public-license
    endpoints are unauthenticated; the rest require auth.
- name: Records (generic)
  description: "Every module that stores records is available at `/api/3/<plural>` with the same list + create / get / update\
    \ / delete shape (list responses are wrapped in a `hydra:member` envelope \u2014 see [Pagination & response shape](#description/pagination-response-shape)).\
    \ The operations below \u2014 list / create on `/api/3/{collection}` and get / update / delete on `/api/3/{collection}/{uuid}`\
    \ \u2014 document that shared shape. The **Alerts** endpoints are a worked example."
- name: Alerts
  description: Concrete CRUD on the `alerts` collection - representative of every record module (`incidents`, `indicators`,
    `tasks`, `assets`, `people`, ...).
- name: Bulk operations
  description: 'High-throughput insert/update/delete/upsert and feed-ingest paths. Note: `/api/ingest-feeds/*` and `/api/insert-feeds/*`
    skip on-create playbook triggers; `POST /api/3/insert/*` does not.'
- name: Query
  description: 'Three search surfaces: URL-param (AND only), POST `/api/query/*` body grammar (full AND/OR + aggregates),
    and global Elasticsearch (`/api/search`). See operation descriptions for when to use which.'
- name: Audit
  description: "Audit log search + retention. Returns one page at a time with no total count \u2014 call `/count` separately\
    \ if you need it. Filters are top-level only and accept exactly one value."
- name: Workflows
  description: Workflow run control, history, and introspection. Lives under `/api/wf/*`.
- name: Triggers
  description: Fire playbooks - by custom-endpoint name, deferred (async), or by workflow id without firing trigger conditions.
- name: Connectors
  description: "Full connector lifecycle. Per-action request shape comes from each connector's `info.json`.\n\n**Flow \u2014\
    \ install \u2192 configure \u2192 execute \u2192 uninstall:**\n\n1. **Install from `.tgz`** \u2014 `POST /api/3/solutionpacks/install?$type=connector&$replace=true`\
    \ (multipart, field `file` = the binary). Response carries the integer connector `id`.\n2. **Create a config** \u2014\
    \ `POST /api/integration/configuration/` with `name`, `connector` (integer id from step 1), and `config` (the connector's\
    \ field values). Add `agent` only if you want the connector to run on a **remote agent**; omit it to use the appliance's\
    \ self-agent. Response carries `config_id` (uuid).\n3. **Execute an action** \u2014 `POST /api/integration/execute/` with\
    \ `connector` name, `version`, `operation`, `config` (the uuid from step 2), and `params`.\n4. **Health-check** \u2014\
    \ `GET /api/integration/connectors/healthcheck/{name}/{version}/?config=<uuid>` for the cheap variant (uses an existing\
    \ config), or the POST form when re-sending a full config inline.\n5. **Cleanup** \u2014 `DELETE /api/integration/configuration/{config_id}/`\
    \ (uuid + trailing slash), then `DELETE /api/integration/connectors/{id}/` (integer id + trailing slash). The trailing\
    \ slash is mandatory \u2014 without it you'll see `403 Could not validate HMAC fingerprint`."
- name: Metadata
  description: Module and field definitions, picklist values, type contexts, and the auto-generated full API listing (handy
    for discovering endpoints not documented here).
- name: Files
  description: Attachment upload. Required as the first step of import-job ingestion.
- name: Access management
  description: "API keys, roles, teams.\n\n**Flow \u2014 create \u2192 bind \u2192 use \u2192 lifecycle \u2192 revoke:**\n\
    \n1. **Create the API-key user** \u2014 `POST /api/auth/users` with body `{\"type\": 9, \"status\": 1, \"api_key_validity\"\
    : <1..365>}`. All three are integers \u2014 the published PDF shows quoted strings, which the appliance rejects with 400.\
    \ Response carries the user `uuid` and the plaintext key.\n2. **Bind it to roles and teams** \u2014 `POST /api/3/api_keys`\
    \ with `name`, `roles` (IRIs), `teams` (IRIs), and `userId` (the uuid from step 1). Required to make the key actually\
    \ usable.\n3. **Read the scope** \u2014 `GET /api/3/api_keys/{uuid}` for one binding, or `GET /api/3/api_keys` for the\
    \ full list.\n4. **Lifecycle operations** \u2014 `PUT /api/auth/users` with `uuid`, `key_type: API_KEY`, and `operation`\
    \ \u2208 `{REVOKE, ACTIVATE, DEACTIVATE, REGENERATE, RESET_VALIDITY}`. `REGENERATE` and `RESET_VALIDITY` also need `api_key_validity`.\n\
    5. **Bulk fetch with plaintext** \u2014 `POST /api/auth/query/users` with `{users: [<uuid>, ...], show_api_key: true}`\
    \ (only returns plaintext for keys whose user was created with `retrievable_mode` enabled in `/api/auth/config`)."
- name: Import / export
  description: Configuration import/export. Read the `import_jobs` description carefully - the inline-envelope shape is a
    silent no-op.
- name: Threat intel (TAXII)
  description: "TAXII 2.1 server exposing FortiSOAR threat-intel collections (FortiGuard feeds, block lists, and any custom\
    \ collections you create). Discovery lives at `/api/taxii/1/`; collections, objects, and manifest endpoints follow.\n\n\
    The server is **read-only**: every default collection advertises `can_write: false` and `POST` to `objects/` is not routed.\
    \ To push STIX into FortiSOAR, use `POST /api/ingest-feeds/stix-bundle` instead.\n\nResponse envelope for `objects/` and\
    \ `manifest/` is `{totalItems, objects: []}` \u2014 a FortiSOAR-specific shape, not the standard TAXII 2.1 `more` / `next`\
    \ cursor. Paginate with `?limit=` and `?added_after=<ISO-8601>`.\n\nAll responses use `Content-Type: application/taxii+json;version=2.1`;\
    \ collection `media_types` advertise `application/stix+json;version=2.1`."

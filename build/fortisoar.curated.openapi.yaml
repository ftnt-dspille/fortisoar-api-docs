      description: "Hydra-paged list of playbook runs that have been moved to historical storage (added in 7.6.1). Same filter\
        \ grammar as `/api/wf/api/workflows/` with one nit: the parent-only filter is named `parent__isnull` here (vs `parent_wf__isnull`\
        \ on the recent endpoint).\n\nUse `GET /api/wf/api/workflows/count?logs=all` for a combined count across recent +\
        \ historical.\n\n**Auth coverage:** `API-KEY: OK` \xB7 `Bearer JWT: OK`"

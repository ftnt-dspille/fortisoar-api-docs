  /api/auth/users:
    get:
      tags:
      - Access management
      summary: Get a specific API-key user (optionally with the unmasked key)
      description: "Lookup by the API-key user's uuid (the `userId` from `GET /api/3/api_keys`). Default response masks the\
        \ key; pass `show_api_key=true` to retrieve the plaintext \u2014 only works when the key was created with `retrievable_mode`\
        \ enabled.\n\n**Auth coverage:** `API-KEY: gated` \xB7 `Bearer JWT: OK`"
      parameters:
      - name: uuid
        in: query
        required: true
        schema:
          type: string
        description: API-key user uuid.
      - name: show_api_key
        in: query
        schema:
          type: boolean
        description: Return the unmasked key (subject to `retrievable_mode`).
      responses:
        '200':
          description: API-key user record.
          content:
            application/json:
              example:
                usersresp:
                - access_type: Concurrent
                  api_key:
                    key: xxxxxxxxxxxxxxxxxxxxxxxxxxxxd81b
                    modify_date: 1778619829
                    retrievable: false
                    status: Active
                    time_remaining: 1
                    valid_until: 1778706229
                  bind_name: null
                  domain: null
                  is_logged_in: false
                  loginid: <uuid>
                  status: 1
                  tenant: null
                  user_type: 9
                  uuid: <uuid>
      x-verified-live:
      - jwt
    post:
      tags:
      - Access management
      summary: Create an API-key user (step 1 of create)
      description: "Creates the underlying user record that carries the key material. The returned `uuid` feeds `POST /api/3/api_keys`\
        \ to attach roles and teams. `type=9` is the API-key user discriminator; `status=1` means active.\n\n**All three body\
        \ fields are integers and required.** The published FortiSOAR API guide shows `type` and `status` as quoted strings\
        \ (`\"9\"`, `\"1\"`); on tested builds, that shape is rejected with a generic 400. Use integer literals.\n\n**Auth\
        \ coverage:** `API-KEY: 403` \xB7 `Bearer JWT: OK`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - type
              - status
              - api_key_validity
              properties:
                type:
                  type: integer
                  enum:
                  - 9
                  description: '`9` = API-key user.'
                status:
                  type: integer
                  enum:
                  - 1
                  description: '`1` = active.'
                api_key_validity:
                  type: integer
                  minimum: 1
                  maximum: 365
                  description: Validity in days; must be in 1..365.
            example:
              api_key_validity: 1
              status: 1
              type: 9
      responses:
        '201':
          description: User created.
          content:
            application/json:
              example:
                api_key:
                  key: <api-key>
                  retrievable: false
                uuid: <uuid>
      x-verified-live:
      - jwt
    put:
      tags:
      - Access management
      summary: 'API-key lifecycle: revoke / activate / deactivate / regenerate / reset validity'
      description: "Single endpoint for all five lifecycle ops, discriminated by the `operation` field. `uuid` here is the\
        \ API-key user uuid (the `userId` returned by `GET /api/3/api_keys`).\n\n- `REVOKE` \u2014 permanent deactivation.\n\
        - `ACTIVATE` / `DEACTIVATE` \u2014 toggle status.\n- `REGENERATE` \u2014 issue a fresh key; requires `api_key_validity`.\n\
        - `RESET_VALIDITY` \u2014 extend/shorten validity; requires `api_key_validity`.\n\n**Auth coverage:** `API-KEY: gated`\
        \ \xB7 `Bearer JWT: OK`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - uuid
              - key_type
              - operation
              properties:
                uuid:
                  type: string
                key_type:
                  type: string
                  enum:
                  - API_KEY
                operation:
                  type: string
                  enum:
                  - REVOKE
                  - ACTIVATE
                  - DEACTIVATE
                  - REGENERATE
                  - RESET_VALIDITY
                api_key_validity:
                  type: integer
                  description: Required for `REGENERATE` and `RESET_VALIDITY`.
            example:
              api_key_validity: 5
              key_type: API_KEY
              operation: REGENERATE
              uuid: <uuid>
      responses:
        '200':
          description: Operation applied.
          content:
            application/json:
              example:
                api_key:
                  key: <api-key>
                  retrievable: false
                  status: Active
                  time_remaining: 5
                  valid_until: 1779051833
                uuid: <uuid>
      x-verified-live:
      - jwt

  /api/wf/api/workflows/:
    get:
      tags:
      - Workflows
      summary: List recent playbook runs
      description: "**See:** [Workflows & triggers](#description/workflows-triggers) (filter by `task_id` to track a triggered\
        \ run)\n\nHydra-paged list of recent playbook execution logs. **Recent** here means runs that have not yet been moved\
        \ to historical storage by the Playbook Log Movement task (runs every 15 minutes for completed playbooks, 60 minutes\
        \ for failed/terminated; configurable in System Configuration).\n\nFor runs older than that, use `GET /api/wf/api/historical-workflows/`.\
        \ To combine both stores in a single query, use `POST /api/wf/api/query/workflow_logs/?logs=all`.\n\nCommon patterns:\n\
        \n- `task_id=<uuid>` (with `parent_wf__isnull=True`) \u2014 look up the run created by a trigger POST,   skipping\
        \ sub-playbook children.\n- `ordering=-modified` + `limit=1` \u2014 newest run first.\n- `template_iri=/api/3/workflows/<uuid>`\
        \ \u2014 runs of a specific playbook.\n- `records=/api/3/alerts/<uuid>` \u2014 runs executed against a specific record.\n\
        - `status=failed&created_after=2024-11-08&created_before=2024-11-10` \u2014 failed runs in a window.\n- `tags_include=ingestion,critical&tags_exclude=system`\
        \ \u2014 tag allow/deny lists.\n\nEach `hydra:member` entry has `status` (one of `incipient`, `active`, `pending`,\
        \ `running`, `finished`, `failed`, `awaiting`, `skipped`, `terminated`, `paused`) and `@id` \u2014 the trailing segment\
        \ is the workflow pk used by the per-run detail GET.\n\n**Auth coverage:** `API-KEY: OK` \xB7 `Bearer JWT: OK`"
      parameters: &id011
      - &id012
        name: format
        in: query
        schema:
          type: string
          default: json
      - &id013
        name: limit
        in: query
        schema:
          type: integer
        description: Maximum number of results to return per page.
      - &id014
        name: offset
        in: query
        schema:
          type: integer
        description: Index from which to start returning results.
      - &id015
        name: ordering
        in: query
        schema:
          type: string
        description: 'Sort field; prefix `-` for descending. Common: `-modified`, `-created`.'
      - &id016
        name: page
        in: query
        schema:
          type: integer
      - &id017
        name: status
        in: query
        schema:
          type: string
          enum:
          - incipient
          - active
          - pending
          - running
          - failed
          - finished
          - awaiting
          - skipped
          - terminated
          - paused
        description: Filter by run state.
      - &id018
        name: task_id
        in: query
        schema:
          type: string
        description: Match the `task_id` returned by a trigger POST. Pair with `parent_wf__isnull=True` to skip sub-playbook
          children.
      - &id019
        name: template_iri
        in: query
        schema:
          type: string
        description: Filter by playbook IRI (e.g. `/api/3/workflows/<uuid>`). Returns history for that specific playbook.
      - &id020
        name: records
        in: query
        schema:
          type: string
        description: Filter by record IRI (e.g. `/api/3/alerts/<uuid>`). Returns runs that executed against that record.
      - &id021
        name: created_after
        in: query
        schema:
          type: string
          format: date
        description: Inclusive lower bound on `created` (ISO date, e.g. `2024-11-08`). Pair with `created_before` for a window.
      - &id022
        name: created_before
        in: query
        schema:
          type: string
          format: date
        description: Inclusive upper bound on `created` (ISO date).
      - &id023
        name: parent_wf__isnull
        in: query
        schema:
          type: boolean
        description: '`True` filters out sub-playbook children (only parent runs returned). On `/historical-workflows/` the
          equivalent flag is `parent__isnull`.'
      - &id024
        name: tags_include
        in: query
        schema:
          type: string
        description: Comma-separated tag allowlist - only runs carrying any of these tags are returned.
      - &id025
        name: tags_exclude
        in: query
        schema:
          type: string
        description: Comma-separated tag denylist - runs carrying any of these tags are filtered out. Combinable with `tags_include`.
      responses:
        '200':
          description: Hydra collection of recent runs.
          content:
            application/json:
              example:
                '@context': /wf/api/workflows/context/
                hydra:firstPage: /wf/api/workflows/?limit=1&ordering=-modified&parent_wf__isnull=True
                hydra:itemsPerPage: 1
                hydra:lastPage: /wf/api/workflows/?limit=1&offset=3&ordering=-modified&parent_wf__isnull=True

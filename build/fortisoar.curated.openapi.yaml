paths:
  /auth/authenticate:
    post:
      tags:
      - Authentication
      summary: Issue a JWT bearer token
      description: "**See:** [Authentication](#description/authentication)\n\nToken-based authentication. Returns a JWT for\
        \ use as `Authorization: Bearer <token>` on subsequent requests. Default TTL is ~30 minutes; long-running clients\
        \ should re-authenticate on 401.\n\n**Note:** The path is `/auth/authenticate` (no `/api` prefix). The PDF references\
        \ `/api/auth/token` as the canonical endpoint, but on current builds it returns 403 even with a valid bearer; use\
        \ this one.\n\n**Auth coverage:** `API-KEY: OK` \xB7 `Bearer JWT: OK`"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
            example:
              credentials:
                loginid: csadmin
                password: $3curityFabric
      responses:
        '200':
          description: JWT issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: <jwt-token>
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example: &id001
                '@context': /api/3/contexts/Error
                '@type': Error
                hydra:title: An error occurred
                hydra:description: Validation failed.
      x-verified-live:
      - apikey
      - jwt
  /api/3/logout:
    post:
      tags:
      - Authentication
      summary: Server-side session invalidation
      description: Invalidates the bearer token server-side, complementing JWT expiry. Optional - JWTs expire on their own.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
            example: {}
      responses:
        '204':
          description: Logged out.

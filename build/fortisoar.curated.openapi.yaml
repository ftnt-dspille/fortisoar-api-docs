  /api/3/files:
    post:
      tags:
      - Files
      summary: Upload a file / attachment
      description: '**See:** [Imports & exports](#description/imports-exports) (file upload is step 1 of import)


        Multipart upload. Used by every connector that captures evidence and as the first step of import-job ingestion.'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      responses:
        '201':
          description: File record (carries `@id` for use as IRI ref).
          content:
            application/json:
              example:
                '@context': /api/3/contexts/File
                '@id': /api/3/files/1f9a3c4d-5e6b-4789-a012-3b4c5d6e7f80
                '@type': File
                uuid: 1f9a3c4d-5e6b-4789-a012-3b4c5d6e7f80
                name: evidence.pcap
                size: 102842
                mimeType: application/vnd.tcpdump.pcap
                createDate: 1736380800
                createUser: /api/3/people/bcb46d5a-0ad8-4480-ac68-9ebc28502a30
  /api/3/roles:
    get:
      tags:
      - Access management
      summary: List roles
      parameters: *id027
      description: Hydra-paged listing of all roles in the tenant. Same `$`-param grammar as any other record collection.
      responses:
        '200':
          description: Collection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HydraCollection'
              example:
                '@context': /api/3/contexts/Alert
                '@id': /api/3/alerts
                '@type': hydra:PagedCollection
                hydra:totalItems: 1
                hydra:itemsPerPage: 30
                hydra:nextPage: /api/3/alerts?%24page=2
                hydra:firstPage: example
                hydra:lastPage: example
                hydra:member: []
                hydra:search: {}
    post:
      tags:
      - Access management
      summary: Create role
      description: Creates a new role. Body shape follows the generic record contract (`name` plus module-specific fields);
        see `GET /api/3/contexts/Role` for the full property list.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              name: Tier1 Analyst
              description: Read all, write alerts/incidents.
              permissions:
                alerts:
                  read: true
                  create: true
                  update: true
                  delete: false
      responses:
        '201':
          description: Created.
          content:
            application/json:
              example:
                '@id': /api/3/roles/f3a2c1de-9b40-4ed3-9f7c-2e1d8a5b3c91
                uuid: f3a2c1de-9b40-4ed3-9f7c-2e1d8a5b3c91
                name: Tier1 Analyst

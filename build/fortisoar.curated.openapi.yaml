  /api/auth/license:
    get:
      tags:
      - System
      summary: Retrieve license details
      description: "**See:** [Authentication](#description/authentication)\n\nReturns the current license state for the cluster\
        \ (or a specific node, with `node_id`). Authenticated equivalent of the `POST /api/public/license` `get_info` flow,\
        \ but reports deployed-license state (`remaining_days`, `expired_nodes`, per-node max users, issue/expiry dates) rather\
        \ than parsing an unsubmitted key.\n\n**Auth quirk on 7.6.x:** typically JWT-only - API key returns 403. Some builds\
        \ also surface a generic 400 on the JWT path when the auth standalone service is unhappy; callers that just need basic\
        \ build info should prefer `GET /api/version` instead.\n\n**Auth coverage:** `API-KEY: 403` \xB7 `Bearer JWT: OK`"
      parameters:
      - name: param
        in: query
        required: false
        schema:
          type: string
          enum:
          - license_details
        description: Set to `license_details` to return the full per-node license report. Omitted -> compact summary.
      - name: node_id
        in: query
        required: false
        schema:
          type: string
        description: Limit the response to one node. Pass `SELF` to mean the node serving the request (added in 7.0.0).
      responses:
        '200':
          description: License details.
          content:
            application/json:
              example:
                details:

  /api/3/import_jobs:
    post:
      tags:
      - Import / export
      summary: Submit an import job (workflow_collections, etc.)
      description: '**See:** [Imports & exports](#description/imports-exports)


        Two-step ingestion: first `POST /api/3/files/` to upload the JSON blob, then create the import job with `file = /api/3/files/<uuid>`
        and `type = ''Import Wizard''`.


        **Default `mergeType` is `merge_append`** - existing records (matched by uuid OR (name, collection)) are silently
        skipped. For dev-loop overwrite semantics, pass explicit `options.playbooks.values[].mergeType = ''merge_replace''`.


        *Gotcha:* posting an export-style envelope (`{type, data, ...}`) inline to this endpoint returns 200 but does nothing
        - the import-job record has no `data` field, the denormalizer drops unknown fields, and the worker skips the result.
        Always go via the file flow.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - type
              - file
              properties:
                type:
                  type: string
                  default: Import Wizard
                file:
                  type: string
                  description: IRI to the uploaded File entity.
                options:
                  type: object
            example:
              type: Import Wizard
              file: /api/3/files/abc123-...
              options:
                playbooks:
                  include: true
                  values:
                  - uuid: <col-uuid>
                    name: <col-name>
                    include: true
                    mergeType: merge_replace
                    includeSchedules: true
      responses:
        '200':
          description: Import job record.
          content:
            application/json:
              example:
                '@context': /api/3/contexts/ImportJob
                '@id': /api/3/import_jobs/f3a2c1de-9b40-4ed3-9f7c-2e1d8a5b3c91
                '@type': ImportJob
                uuid: f3a2c1de-9b40-4ed3-9f7c-2e1d8a5b3c91
                type: Import Wizard
                status: Queued
                file: /api/3/files/1f9a3c4d-5e6b-4789-a012-3b4c5d6e7f80
                createDate: 1736380800
                options:
                  playbooks:
                    include: true
                    values:
                    - uuid: c0d3e8a1-7b2f-4a91-b85e-7d2e1f3a4b56
                      name: Phishing Response
                      include: true
                      mergeType: merge_replace
                      includeSchedules: true

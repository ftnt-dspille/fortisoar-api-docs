      summary: Workflow count
      description: "Total run count. `?logs=all` (default) combines recent + historical; pass `logs=recent` or `logs=historical`\
        \ to restrict.\n\n**Trailing slash matters.** `/api/wf/api/workflows/count` (no slash) hits an HMAC-gated handler\
        \ that returns `403 \"Could not validate HMAC fingerprint\"` under Bearer or API-KEY; the slashed form `/api/wf/api/workflows/count/`\
        \ returns the count under either auth.\n\n**Auth coverage:** `API-KEY: OK` \xB7 `Bearer JWT: OK`"
      parameters:
      - name: logs
        in: query
        schema:
          type: string
          enum:
          - all
          - recent
          - historical
          default: all
        description: Source of the count.
      - name: format
        in: query
        schema:
          type: string
          default: json
      responses:
        '200':
          description: Count.
          content:
            application/json:
              example:
                count: 1341

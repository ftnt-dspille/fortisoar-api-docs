openapi: 3.1.0
info:
  title: FortiSOAR API
  version: 0.1.0
  summary: Hand-shaped subset of the FortiSOAR REST API.
  description: "A hand-shaped OpenAPI 3.1 reference for the FortiSOAR REST API.\n\n> **Disclaimer.** This reference is a community\
    \ effort and is **not exhaustive**. Coverage is the surface I use day-to-day; many operations are still missing. Operations\
    \ stamped with **Live-verified** at the top of the page were exercised end-to-end against a real FortiSOAR. Anything without\
    \ that stamp is documented from the API guide and DB introspection only - request/response shapes are best-effort, not\
    \ guaranteed to be correct. Always validate against your own appliance before relying on it.\n>\n> **What the Live-verified\
    \ line tells you.** It looks like: **Live-verified** (`apikey: OK` - `jwt: OK`, YYYY-MM-DD).\n>\n> - `apikey: OK` / `jwt:\
    \ OK` - the verifier called the operation with that auth mode and got a 2xx response. Captured (sanitized) responses are\
    \ folded into the `200` example.\n> - `apikey: 401` (or `403`, `404`, ...) - that auth mode returned the listed status\
    \ code. Some endpoints only accept one auth mode; that's fine, just means the other won't work for you either.\n> - Trailing\
    \ date - when the verifier last hit this op.\n> - No Live-verified line at all - never executed by the verifier. Treat\
    \ as documentation-only.\n\nSchemas (`Alert`, `RecordLog`, ...) are validated against captured responses where present.\
    \ Run `python src/verify_curated.py` against your FortiSOAR (creds in `.env`) to refresh the verification report.\n\n\
    ## Concepts\n\nThe entire API is **JSON-LD + Hydra**. Every record carries `@id` (its IRI), `@type` (entity name), and\
    \ `@context` (model URL). Collections wrap records in a `hydra:Collection` envelope (see [Pagination & response shape](#description/pagination-response-shape)).\n\
    \n- **IRI** (Internationalized Resource Identifier) - relative URL like `/api/3/alerts/<uuid>`. Used as a foreign-key\
    \ reference everywhere FK references appear in JSON. Server *generates* `@id` on insert; clients should not send it.\n\
    - **UUID** - 36-character hex w/ hyphens. Optional on POST: send your own to retain it for cross-system reference, or\
    \ omit and read it back from the response IRI.\n- **CamelCase** - every key is camelCase (`sourceId`, `dueDate`, `hydra:variableRepresentation`).\
    \ Use the same convention for any custom modules.\n- **Picklist values are IRIs from 7.5.0+.** Posting `\"severity\":\
    \ \"High\"` is rejected; you must post `\"severity\": \"/api/3/picklists/<value-uuid>\"`. Fetch the value's IRI from `GET\
    \ /api/3/picklists?listName.name=AlertSeverity&itemValue=High`. Bulk-feed paths are an exception (no validation).\n- **Trigger-bypass\
    \ semantics.** `POST /api/ingest-feeds/*` and `POST /api/insert-feeds/*` skip on-create playbook triggers (intentional,\
    \ for high-volume feeds). `POST /api/3/insert/*` (with optional `__bulk: true` for batching) does **not** skip triggers.\n\
    \n## Authentication\n\nThree documented methods; only two are recommended.\n\n| Method | Header | When to use |\n|---|---|---|\n\
    | **API key** (recommended) | `Authorization: API-KEY <key>` (note literal space) | Appliances, scheduled jobs, long-lived\
    \ integrations. Mint via Settings -> Security Management -> Access Keys. |\n| **Bearer JWT** | `Authorization: Bearer\
    \ <jwt>` | Short-lived / interactive use. Obtain from `POST /auth/authenticate`. Default TTL ~30 min; re-auth on 401.\
    \ |\n| HMAC | (legacy) | Documented in the public PDF for completeness. Out of scope here - most clients should use API\
    \ key. |\n\nSome endpoints accept only one method. The **`Live-verified`** badge on each op shows per-auth status; `apikey:\
    \ 403` next to `jwt: 200` means that endpoint is JWT-only on the box we tested. Examples observed: `/api/auth/cluster/health`\
    \ requires JWT; `/api/auth/license` is JWT-only; most CRUD works with both.\n\nThe `/api/version` and `/api/public/license`\
    \ endpoints are **public** (no auth required).\n\n## Pagination & response shape\n\nEvery `GET /api/3/<plural>` returns\
    \ a Hydra paged collection:\n\n```json\n{\n  \"@context\": \"/api/3/contexts/Alert\",\n  \"@id\": \"/api/3/alerts\",\n\
    \  \"@type\": \"hydra:PagedCollection\",\n  \"hydra:totalItems\": 1247,\n  \"hydra:itemsPerPage\": 30,\n  \"hydra:firstPage\"\
    : \"/api/3/alerts\",\n  \"hydra:nextPage\":  \"/api/3/alerts?$page=2\",\n  \"hydra:lastPage\":  \"/api/3/alerts?$page=42\"\
    ,\n  \"hydra:member\": [ ... ],\n  \"hydra:search\":  { \"@type\": \"hydra:IriTemplate\", \"hydra:template\": \"/api/3/alerts{?}\"\
    , \"hydra:mapping\": [] }\n}\n```\n\n`hydra:member` is the array. The rest is navigation/metadata.\n\n### Reserved query\
    \ parameters\n\n| Param | Default | Notes |\n|---|---|---|\n| `$limit` | 30 | Max **5000** (server-enforced cap). |\n\
    | `$page` | 1 | 1-indexed. |\n| `$orderby` | - | `field` or `-field` for desc. Body `sort[]` is the equivalent on `/api/query`.\
    \ |\n| `$relationships` | `false` | When `true`, FK fields are inlined (e.g. `severity` becomes the picklist record dict\
    \ instead of an IRI string). |\n| `$export` | `false` | Strips identity fields so the result re-imports cleanly. Used\
    \ by export UI. |\n| `$partial` | `false` | When `true`, `hydra:totalItems` is omitted (skips `COUNT(*)`). Useful when\
    \ paging blindly. |\n| `$search` | - | See [Query reference](#description/query-reference) - top-level token, distinct\
    \ from the per-field `search` operator. |\n| `$fields` | - | **Power user** - `?$fields=uuid,name,steps` returns only\
    \ those columns. Big response-size win on bulk pulls. |\n\n### Power-user URL filtering\n\nThese work on every `/api/3/<plural>`\
    \ endpoint and cover ~90% of what `/api/query/*` does without a body:\n\n- **Nested dot notation** traverses relationships\
    \ at any depth: `?triggerStep.stepType.name=cybersponse.post_create&triggerStep.arguments.resources$exists=alerts&isActive=true`.\
    \ Either `.` or `__` works (`steps__stepType__name` \u2261 `steps.stepType.name`).\n- **Operators** are appended with\
    \ `$`: `?eventCount$gte=10&eventCount$lt=20`, `?status__itemValue$in=Open|Resolved|InProgress`. Default operator (no `$op`\
    \ suffix) is `eq`.\n- **Existence on collections**: `<rel>.<arrayField>$exists=value` - \"find playbooks whose trigger\
    \ covers this module\". Example: `triggerStep.arguments.resources$exists=alerts`.\n- **Multiple parts are ANDed.** No\
    \ way to OR via URL params - repeating a key (`?field=A&field=B`) returns `400 Bad Request`. Use the body endpoint for\
    \ OR.\n\n## Query reference\n\nThree distinct query surfaces - pick by use case:\n\n| Surface | Endpoint | Filter | Aggregations\
    \ | Best for |\n|---|---|---|---|---|\n| URL-param | `GET /api/3/<resource>?...` | AND of leaf ops | none | Single-condition\
    \ AND; simple lookups |\n| Body | `POST /api/query/<resource>` | full AND/OR tree | yes | Anything non-trivial; complex\
    \ filters; counts |\n| Global | `POST /api/search` | keyword `q` | none | Cross-module text search (Elasticsearch) |\n\
    \n### Body grammar for the query endpoint\n\n```jsonc\n{\n  \"logic\": \"AND\" | \"OR\",\n  \"filters\": [\n    { \"field\"\
    : \"<path>\", \"operator\": \"<op>\", \"value\": <val>, \"type\": \"<type>\"? },   // leaf\n    { \"logic\": \"AND\" |\
    \ \"OR\", \"filters\": [ ... ] }                                    // nested group\n  ],\n  \"sort\":       [ { \"field\"\
    : \"<path>\", \"direction\": \"asc\" | \"desc\" } ],\n  \"aggregates\": [ { \"operator\": \"<op>\", \"field\": \"<path>\"\
    , \"alias\": \"<name>\" } ]\n}\n```\n\nPagination + `$search` ride on the **query string** (`?$limit=30&$page=2&$search=fortinet`);\
    \ body fields named `page`/`pageSize`/`limit` are silently ignored.\n\n### Leaf operators\n\n| Operator | Behavior | Notes\
    \ |\n|---|---|---|\n| `eq` | exact equality | Default if `operator` omitted. For association IRIs, the UUID is extracted\
    \ before comparison. |\n| `neq` | exact inequality | |\n| `lt`, `lte`, `gt`, `gte` | numeric / date comparisons | With\
    \ `type: \"datetime\"` + a numeric value, the value is treated as epoch. |\n| `in` | match any of N | Accepts `[...]`\
    \ array or a `\\|`-delimited string. **Lowercases** string values. Association IRIs -> UUIDs. |\n| `nin` | NOT IN | Generated\
    \ SQL is `NOT IN (...) OR field IS NULL` - **includes NULL rows by design**. |\n| `like` | SQL LIKE | **Lowercases** the\
    \ value; matches against `LOWER(field)` for non-JSON columns. Wildcards `%` `_`. |\n| `notlike` | SQL NOT LIKE | Excluded\
    \ from `ALL_OPERATORS` whitelist - works in practice but may be UI-hidden / pending deprecation. |\n| `contains` | JSON\
    \ containment | For `jsonb` columns. |\n| `exists` | JSON path existence | Undocumented in the public guide; works against\
    \ JSON-typed columns. |\n| `isnull` | `true` -> IS NULL, `false` -> IS NOT NULL | |\n| `search` | per-field full-text\
    \ | **Source-only.** Declared in the parser but every wire form returns 500. Use `$search` instead. |\n\n### Aggregations\n\
    \n| Operator | DQL | Notes |\n|---|---|---|\n| `fields`, `select` | `SELECT field AS alias` | Selecting raw fields; **does\
    \ not flip query into aggregate mode**. |\n| `count` | `COUNT(field)` | `field: \"*\"` -> root alias. |\n| `countdistinct`\
    \ | `COUNT(DISTINCT field)` | Omitted from `ALL_OPERATORS` whitelist but works at builder layer. |\n| `groupby` | adds\
    \ `GROUP BY field` | Pair with a metric (`count`/`sum`/...). |\n| `distinct` | `DISTINCT field` | |\n| `sum`, `max`, `min`\
    \ | corresponding SQL | |\n| `avg`, `median` | corresponding SQL | Constants exist; **omitted from whitelist** (still\
    \ emit). |\n\nA query is treated as aggregate iff `aggregates[]` contains anything other than `fields`/`select`. That\
    \ changes the response shape - `hydra:member` becomes aggregate rows instead of records.\n\n### Field projection with\
    \ selectFields and ignoreFields\n\nBody-level allow/deny lists for the response shape. Lighter than aggregations - they\
    \ don't flip the query into aggregate mode, they just shape what each `hydra:member` record contains.\n\n```jsonc\n{\n\
    \  \"logic\": \"AND\",\n  \"filters\": [ { \"field\": \"status.itemValue\", \"operator\": \"eq\", \"value\": \"Open\"\
    \ } ],\n  \"__selectFields\": [\"id\", \"uuid\", \"name\", \"severity\", \"status\", \"createDate\"]\n}\n```\n\n```jsonc\n\
    {\n  \"logic\": \"AND\",\n  \"filters\": [ { \"field\": \"createDate\", \"operator\": \"gte\", \"value\": 1735689600,\
    \ \"type\": \"datetime\" } ],\n  \"__ignoreFields\": [\"createDate\", \"createUser\", \"modifyDate\", \"modifyUser\",\
    \ \"@settings\"]\n}\n```\n\nUse one or the other, not both. Common for **bulk export** (drop audit/ownership fields) and\
    \ **bulk dashboards** (only fetch what the tile renders). Equivalent to the URL-side `$fields` projection on `GET /api/3/<resource>`\
    \ but available on the body grammar where you also have OR / nested filters / aggregates.\n\n### Top-level search URL\
    \ parameter\n\nAvailable on **both** `GET /api/3/<resource>` and `POST /api/query/<resource>`:\n\n```\nGET  /api/3/workflows?$search=fortinet\n\
    POST /api/query/workflows?$search=fortinet  + body filters\n```\n\n- Case-insensitive substring across the entity's \"\
    searchable fields\" (per-entity set).\n- Tokenized when multi-word.\n- AND-combinable with body filters / URL filters.\n\
    - No min-length gate (`$search=a` happily matches).\n- **Top-level only.** Putting `{\"$search\": \"x\"}` inside the body's\
    \ `filters[]` is silently ignored.\n\n### Elasticsearch global search endpoint\n\nDifferent beast. Use for \"global search\
    \ bar\" UX; for deterministic per-entity filtering use `/api/query` instead.\n\n```jsonc\n{\n  \"q\": \"fortinet phishing\"\
    ,         // **min 3 chars** enforced\n  \"index\": [\"alerts\", \"incidents\"], // required, non-empty\n  \"size\": 30,\
    \ \"offset\": 0,\n  \"searchType\": \"_default\",\n  \"modifyDateGte\": 0, \"modifyDateLte\": 0\n}\n```\n\n- Multi-index\
    \ in one call.\n- Team / RBAC scoped automatically (joins `accessibleTeamIris`).\n- 3-character minimum enforced server-side.\n\
    - Some 7.6.x builds return 500 here with a server-side TypeError; verify on your appliance before relying on it.\n\n###\
    \ Persisted queries\n\nSave a body via `POST /api/3/query_objects`, then invoke via `POST /api/query/<resource>/<queryId>`.\
    \ Useful as a permission-grantable replacement for hand-shipping query bodies in client code. CRUD lives at `/api/3/queries`,\
    \ `/api/3/system_queries`, `/api/3/user_queries`.\n\n## Audit gateway quirks\n\n`POST /api/gateway/audit/activities` is\
    \ the workhorse for SIEM-style log pulls. It has nine traps worth knowing about up-front.\n\n1. **Slice pagination, no\
    \ totals.** The response has no `totalElements` / `totalPages` / `last` (intentional - the repository skips `COUNT(*)`\
    \ for performance). Detect end-of-data via empty `content` or `content.length < limit`. For totals, call the sibling `/count`\
    \ endpoint.\n2. **Default `limit` is 10 if you misname the param.** Conventions like `size`, `pageSize`, `max` are silently\
    \ dropped and the server applies its default of 10. Only `limit` works.\n3. **`filterParams: { ... }` wrapper is silently\
    \ ignored.** Filters must be at the top level of the body; anything nested under `filterParams` is dropped.\n4. **Arrays\
    \ don't work for any filter.** `{\"operation\": [\"Login Success\"]}` (single-element array) silently no-ops. `{\"operation\"\
    : [\"A\", \"B\"]}` returns 400. To get multiple ops server-side, make multiple calls and merge.\n5. **`user` is not filterable,\
    \ only `userId`.** `{\"user\": \"Jane Doe\"}` is silently ignored. `{\"userId\": \"jdoe\"}` works.\n6. **`search` is brittle.**\
    \ `{\"search\": \"Login\"}` returned 0 hits even with many \"Login\" titles in the data. Probably searches a specific\
    \ subset of fields with prefix-only matching. Don't rely on it.\n7. **No server-side sort control.** Records arrive `id\
    \ DESC` (newest first). No `sort` param honored. Sort client-side if you need anything else.\n8. **`displayName` arrives\
    \ dirty.** Some records have extra whitespace, embedded UUIDs, even unrelated text from other fields. Sanitize on read.\n\
    9. **JWT lifetime is short.** Default ~30 min; long-running syncs need to re-auth on 401 or use a service-account token\
    \ with extended TTL.\n\nThe 45-value `operation` enum is in the `AuditOperation` schema; fetch it dynamically from `GET\
    \ /api/gateway/audit/operations`.\n\n## Workflows & triggers\n\nRun control lives under `/api/wf/*`. The endpoints below\
    \ cover the most common control flows; less-used ones (`historical-workflows/*`, `expressions/*`, `dynamic-variable/*`)\
    \ are tracked as a future expansion.\n\n- `POST /api/wf/api/workflows/{pk}/start/` - manually queue.\n- `POST /api/wf/api/workflows/{pk}/resume/`\
    \ - resume a `paused` run. **Not for `awaiting`** - that uses manual-input PUT.\n- `POST /api/wf/api/workflows/{pk}/retry/`\
    \ - retry a failed run from the failed step.\n- `POST /api/wf/api/workflows/{pk}/approval/` - approval-step shortcut.\n\
    \n**Decoy alert:** `POST /api/wf/api/workflows/{pk}/wfinput_resume/` exists and looks canonical, but the actual resume\
    \ path for `awaiting` runs is **`PUT /api/wf/api/manual-wf-input/{pk}/`** with body `{workflow: <int_pk>, input: <dict>,\
    \ type, step_id}`. Don't use `wfinput_resume`.\n\n### Triggers\n\nThree ways to fire a playbook from outside:\n\n- **`POST\
    \ /api/triggers/1/{name}`** - hits a Custom API Endpoint trigger (named via the trigger config). Allows alternate auth\
    \ (Basic / no-auth) for external webhooks, by design - keeps the core API token-locked while letting webhook senders use\
    \ simpler auth.\n- **`POST /api/triggers/1/deferred/{name}`** - same as above but async (returns 202).\n- **`POST /api/triggers/1/notrigger/{workflowId}`**\
    \ - direct execution of a workflow by UUID, bypassing trigger conditions. Useful for testing.\n\nThe notifier service\
    \ has additional fan-out via STOMP-over-WebSocket at `/websocket/` (server pushes workflow updates on `/topic/workflows/`).\
    \ No REST surface; out of scope here.\n\n## Imports & exports\n\nThere are **two import paths** with different semantics;\
    \ the wrong choice silently fails.\n\n| Endpoint | Body | Behavior |\n|---|---|---|\n| `POST /api/3/workflow_collections`\
    \ | unwrapped collection (`{name, description, visible, uuid, workflows: [...]}`) | strict create. **409 `UniqueConstraintViolationException`**\
    \ on UUID collision. |\n| `POST /api/3/import_jobs` | export-style envelope (`{type, data, macros, exported_tags}`) |\
    \ **does not import the JSON inline** - see gotcha below. |\n\n### The import_jobs gotcha\n\nThe import-job record has\
    \ fields `file`, `status`, `options`, `type` - and **no `data` field**. The server's request decoder silently drops unknown\
    \ keys and accepts your payload's outer `type` (e.g. `\"workflow_collections\"`), overriding the expected `\"Import Wizard\"\
    ` value. Result: 200 OK, no actual import.\n\n**Real flow:**\n\n1. `POST /api/3/files/` (multipart) - upload the JSON\
    \ blob.\n2. `POST /api/3/import_jobs` with `{file: \"/api/3/files/<uuid>\", type: \"Import Wizard\", options: {...}}`.\n\
    3. The import worker picks up the job and applies the file.\n\n### Default mergeType is merge_append\n\nA naive re-POST\
    \ to `import_jobs` returns 200 but **silently skips** any playbook whose UUID *or* `(name, collection)` matches an existing\
    \ record. For dev-loop overwrite semantics, attach explicit options:\n\n```json\n{\n  \"type\": \"Import Wizard\",\n \
    \ \"file\": \"/api/3/files/<uuid>\",\n  \"options\": {\n    \"playbooks\": {\n      \"include\": true,\n      \"values\"\
    : [\n        {\"uuid\": \"<col-uuid>\", \"name\": \"<col-name>\",\n         \"include\": true, \"mergeType\": \"merge_replace\"\
    ,\n         \"includeSchedules\": true}\n      ]\n    }\n  }\n}\n```\n\n| `mergeType` | Collection-level | Workflow-level\
    \ |\n|---|---|---|\n| `rename` | suffix ` (1)`, ` (2)`... until unique; new UUID | re-rolls UUIDs |\n| `replace` | DELETE\
    \ + insert | (whole collection replaced) |\n| `merge_replace` | keep collection, replace workflows | UUID-or-name match\
    \ -> DELETE -> insert new |\n| `merge_append` (default) | keep collection, add new | UUID-or-name match -> skip incoming\
    \ |\n\n### Entity uniqueness constraints\n\n| Entity | Constraint | Notes |\n|---|---|---|\n| `WorkflowCollection.name`\
    \ | `nullable=false`, **`unique=true`** instance-wide | rename or DELETE the existing one before re-import. |\n| `Workflow`\
    \ | `UniqueConstraint(columns={\"name\", \"collection\"})` | unique **per collection**, not globally. |\n| `Workflow.aliasName`\
    \ | `nullable=true`, no unique constraint | safe to emit `null`. |\n| `WorkflowStep.name` | `nullable=false`, length 255\
    \ | required. |\n| `WorkflowRoute.sourceStep` / `targetStep` | FK `nullable=false`, `onDelete=\"CASCADE\"` | both required;\
    \ deleting a step cascades its routes. |\n\n### Cross-collection UUID collision\n\nIf a workflow UUID matches one already\
    \ in a *different* collection, FortiSOAR re-rolls a fresh UUID for the workflow **and all its steps**. Deterministic UUIDs\
    \ are stable **within a collection** only, not portable across.\n"
servers:
- url: https://{host}
  variables:
    host:
      default: fortisoar.example.com
security:
- apiKeyAuth: []
- bearerJwt: []
tags:
- name: Authentication
  description: Token issuance, logout, and current-user / current-actor introspection.
- name: System
  description: Build version, license info, HA cluster health, feature flags, and cache invalidation. The version + public-license
    endpoints are unauthenticated; the rest require auth.
- name: Records (generic)
  description: Every record-bearing entity is exposed at `/api/3/<plural>` with the same Hydra-paged contract. These two operations
    document the shared shape; the **Alerts** tag is a worked example.
- name: Alerts
  description: Concrete CRUD on the `alerts` collection - representative of every record module (`incidents`, `indicators`,
    `tasks`, `assets`, `people`, ...).
- name: Bulk operations
  description: 'High-throughput insert/update/delete/upsert and feed-ingest paths. Note: `/api/ingest-feeds/*` and `/api/insert-feeds/*`
    skip on-create playbook triggers; `POST /api/3/insert/*` does not.'
- name: Query
  description: 'Three search surfaces: URL-param (AND only), POST `/api/query/*` body grammar (full AND/OR + aggregates),
    and global Elasticsearch (`/api/search`). See operation descriptions for when to use which.'
- name: Audit
  description: Audit log query + retention. Slice pagination with no totals - use `/count` separately. Filters are top-level
    only and accept exactly one value.
- name: Workflows
  description: Workflow run control, history, and introspection. Lives under `/api/wf/*`.
- name: Triggers
  description: Fire playbooks - by custom-endpoint name, deferred (async), or by workflow id without firing trigger conditions.
- name: Connectors
  description: Connector listing, configuration CRUD, health check, and action execution. Per-operation request shape comes
    from each connector's `info.json` definition.
- name: Metadata
  description: Module + field schemas, picklist taxonomy, JSON-LD contexts, and the Hydra `ApiDocumentation` (use this to
    expand the curated surface).
- name: Files
  description: Attachment upload. Required as the first step of import-job ingestion.
- name: Access management
  description: API keys, roles, teams.
- name: Import / export
  description: Configuration import/export. Read the `import_jobs` description carefully - the inline-envelope shape is a
    silent no-op.
x-tagGroups:
- name: Auth & system
  tags:
  - Authentication
  - System
  - Access management
- name: Records
  tags:
  - Records (generic)
  - Bulk operations
  - Alerts
- name: Query
  tags:
  - Query
- name: Audit
  tags:
  - Audit
- name: Automation
  tags:
  - Workflows
  - Triggers
  - Connectors
- name: Reference
  tags:
  - Metadata
  - Files
  - Import / export
paths:
  /auth/authenticate:
    post:
      tags:
      - Authentication
      summary: Issue a JWT bearer token
      description: '**Unverified** - permanent skip (example body unfit for live execution). Example data below is synthetic.


        **See:** [Authentication](#description/authentication)


        Token-based authentication. Returns a JWT for use as `Authorization: Bearer <token>` on subsequent requests. Default
        TTL is ~30 minutes; long-running clients should re-authenticate on 401.


        **Note:** The path is `/auth/authenticate` (no `/api` prefix). The PDF references `/api/auth/token` as the canonical
        endpoint, but on current builds it returns 403 even with a valid bearer; use this one.'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
            example:
              credentials:
                loginid: csadmin
                password: <password>
      responses:
        '200':
          description: JWT issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9...
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example: &id001
                '@context': /api/3/contexts/Error
                '@type': Error
                hydra:title: An error occurred
                hydra:description: Validation failed.
      x-fsr-status: unverified-skipped
  /api/3/logout:
    post:
      tags:
      - Authentication
      summary: Server-side session invalidation
      description: '**Live-verified** (`apikey: 400` - `jwt: OK`, 2026-05-10)


        Invalidates the bearer token server-side, complementing JWT expiry. Optional - JWTs expire on their own.'
      responses:
        '204':
          description: Logged out.
      x-fsr-status: verified
      x-fsr-verification:
        apikey:
          status: 400
          elapsed_ms: 324
          schema_ok: null
          schema_errors: []
          sent_request:
            method: POST
            path: /api/3/logout
            params: null
            body: null
          sample_response:
            type: Exception
            message: Internal Server Error. Check log 'prod.log' for more details
        jwt:
          status: 200
          elapsed_ms: 388
          schema_ok: true
          schema_errors:
          - no 2xx schema to validate
          sent_request:
            method: POST
            path: /api/3/logout
            params: null

  /api/wf/api/workflows/log_list/:
    post:
      tags:
      - Workflows
      summary: Status lookup by `task_id`
      description: "Returns the status of one or more executing playbooks identified by `task_id`. The `task_id` is what a\
        \ trigger POST returns (top-level on `/api/triggers/1/{name}`, sometimes nested under `data` for legacy triggers).\n\
        \nPagination + sort + filter params are passed in the query string; the request body is empty `{}`. Pair `task_id=<uuid>`\
        \ with `parent_wf__isnull=True` to skip sub-playbook child runs.\n\nExample: `POST /api/wf/api/workflows/log_list/?format=json&limit=10&offset=0&ordering=-modified&page=1&task_id=c762219d-947a-483e-8818-e2795dbc1b7b&parent_wf__isnull=True`\n\
        \n**Auth coverage:** `API-KEY: OK` \xB7 `Bearer JWT: OK`"
      parameters: *id024
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
            example: {}
      responses:
        '200':
          description: Hydra collection of matching runs.
          content:
            application/json:
              example:
                '@context': /wf/api/workflows/log_list/context/
                hydra:firstPage: /wf/api/workflows/log_list/?format=json&limit=2&ordering=-modified&page=1&parent_wf__isnull=True
                hydra:itemsPerPage: 2
                hydra:lastPage: /wf/api/workflows/log_list/?format=json&limit=2&offset=28&ordering=-modified&page=1&parent_wf__isnull=True
                hydra:member:

      description: '**Live-verified** (`apikey: OK (schema drift)` - `jwt: OK (schema drift)`, 2026-05-10)


        **See:** [Concepts](#description/concepts) - [Pagination & response shape](#description/pagination-response-shape)


        Returns a Hydra paged collection of alerts. Filter via `?<field>$<operator>=<value>` (URL-param grammar - see Query
        API). Reserved `$`-params apply: `$limit`, `$page`, `$orderby`, `$relationships`, `$search`.'
      parameters:
      - &id002
        name: $limit
        in: query
        description: Max records per page. Default 30, max 5000.
        schema:
          type: integer
          default: 30
          minimum: 1
          maximum: 5000
        example: 30
      - &id003
        name: $page
        in: query
        description: 1-indexed page number.
        schema:
          type: integer
          default: 1
          minimum: 1
        example: 1
      - &id004
        name: $orderby
        in: query
        description: 'Sort field; prefix `-` for descending. Example: `-createDate`.'
        schema:
          type: string
          example: -createDate
      - &id005
        name: $relationships
        in: query
        description: Inline related records instead of returning IRI refs.
        schema:
          type: boolean
          default: false
        example: false
      - &id006
        name: $export
        in: query
        description: Strip identity fields so the result re-imports cleanly.
        schema:
          type: boolean
          default: false
      - &id007
        name: $partial
        in: query
        description: Skip the COUNT(*) - omits hydra:totalItems for faster paging.
        schema:
          type: boolean
          default: false
      - &id008
        name: $search
        in: query
        description: Case-insensitive substring search across the entity's searchable fields. Tokenized when multi-word; AND-combinable
          with body filters; no min length.
        schema:
          type: string
      - &id009
        name: $fields
        in: query
        description: 'Comma-separated projection - return only these columns. Big response-size win on bulk pulls. Example:
          `uuid,name,severity,status,createDate`.'
        schema:
          type: string
      - name: name
        in: query
        description: Exact-match filter on the record's name.
        schema:
          type: string
        example: Phishing email - finance
      - name: name$like
        in: query
        description: Case-insensitive LIKE filter on name. Use `%` and `_` wildcards.
        schema:
          type: string
        example: '%phish%'
      - name: severity.itemValue
        in: query
        description: Filter by the picklist value's display label (e.g. `High`, `Critical`).
        schema:
          type: string
        example: High
      - name: severity.itemValue$in

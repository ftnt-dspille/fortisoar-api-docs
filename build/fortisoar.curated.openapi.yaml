              properties:
                name:
                  type: string
                  description: Display name (unique per user).
                models:
                  type: string
                  description: Model IRI - `/api/3/model_metadatas/<uuid>` for the target module.
                query:
                  type: object
                  description: Same body grammar as `POST /api/query/{collection}` (`logic`, `filters`, `limit`, `sort`, ...).

        Two-step ingestion: first `POST /api/3/files/` to upload the JSON blob, then create the import job with `file = /api/3/files/<uuid>`
        and `type = ''Import Wizard''`.


        **Default `mergeType` is `merge_append`** - existing records (matched by uuid OR (name, collection)) are silently
        skipped. For dev-loop overwrite semantics, pass explicit `options.playbooks.values[].mergeType = ''merge_replace''`.


        *Gotcha:* posting an export-style envelope (`{type, data, ...}`) inline to this endpoint returns 200 but does nothing
        - the import-job record has no `data` field, the denormalizer drops unknown fields, and the worker skips the result.
        Always go via the file flow.'

  /api/3/alerts:
    get:
      tags:
      - Alerts
      summary: List alerts
      description: "**See:** [Concepts](#description/concepts) - [Pagination & response shape](#description/pagination-response-shape)\n\
        \nReturns a Hydra paged collection of alerts. Filter via `?<field>$<operator>=<value>` (URL-param grammar - see Query\
        \ API). Reserved `$`-params apply: `$limit`, `$page`, `$orderby`, `$relationships`, `$search`.\n\n**Auth coverage:**\
        \ `API-KEY: OK` \xB7 `Bearer JWT: OK`"
      parameters:
      - &id002
        name: $limit
        in: query
        description: Max records per page. Default 30, max 5000.
        schema:
          type: integer
          default: 30
          minimum: 1
          maximum: 5000
      - &id003
        name: $page
        in: query
        description: 1-indexed page number.
        schema:
          type: integer
          default: 1
          minimum: 1
      - &id004
        name: $orderby
        in: query
        description: 'Sort field; prefix `-` for descending. Example: `-createDate`.'
        schema:
          type: string
          example: -createDate
      - &id005
        name: $relationships
        in: query
        description: "Controls whether linked modules are included in the response. When `true`, related collections (e.g.\
          \ an alert's `tasks`, `indicators`, `assets`) are populated. When `false` (default), those collections are left\
          \ out of the response entirely \u2014 not returned as empty arrays. Single-value links like `severity`, `status`,\
          \ `createUser` are always returned as full record objects regardless of this flag."
        schema:
          type: boolean
          default: false
      - &id006
        name: $export
        in: query
        description: Strip identity fields so the result re-imports cleanly.
        schema:
          type: boolean
          default: false
      - &id007
        name: $partial
        in: query
        description: Skip the COUNT(*) - omits hydra:totalItems for faster paging.
        schema:
          type: boolean
          default: false
      - &id008
        name: $search
        in: query
        description: Case-insensitive substring search across the entity's searchable fields. Tokenized when multi-word; AND-combinable
          with body filters; no min length.
        schema:
          type: string
      - &id009
        name: $fields
        in: query
        description: 'Comma-separated projection - return only these columns. Big response-size win on bulk pulls. Example:
          `uuid,name,severity,status,createDate`.'
        schema:
          type: string
      - &id010
        name: name
        in: query
        description: Exact-match filter on the record's name.
        schema:
          type: string
        example: Phishing email - finance
      - &id011
        name: name$like
        in: query
        description: Case-insensitive LIKE filter on name. Use `%` and `_` wildcards.
        schema:
          type: string
        example: '%phish%'
      - &id012
        name: severity.itemValue
        in: query
        description: Filter by the picklist value's display label (e.g. `High`, `Critical`).
        schema:
          type: string
        example: High
      - &id013
        name: severity.itemValue$in
        in: query
        description: Multi-value filter, pipe-delimited.
        schema:
          type: string
        example: High|Critical
      - &id014
        name: status.itemValue
        in: query
        description: Filter by status picklist label.
        schema:
          type: string
        example: Open
      - &id015
        name: status.itemValue$neq
        in: query
        description: Exclude records with this status.
        schema:
          type: string
        example: Closed
      - &id016
        name: assignedTo
        in: query
        description: Filter by assignee IRI (`/api/3/people/<uuid>`).
        schema:
          type: string
      - &id017
        name: createDate$gte
        in: query
        description: Created on or after this epoch (seconds). Pair with `createDate$lte` for windows.

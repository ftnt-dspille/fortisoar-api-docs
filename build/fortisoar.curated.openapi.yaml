    post:
      tags:
      - System
      summary: Deploy a license (authenticated)
      description: '**See:** [Authentication](#description/authentication)


        Authenticated license deployment. Requires a **previously valid** license to be currently active - this form is intended
        for renewals / replacements, not first-time activation. For first-time activation on a fresh appliance use the unauthenticated
        `POST /api/public/license` with `action: deploy_license`.


        Body carries the raw `license_key` (the contents of the `.lic` file). Returns 200 OK on success.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - license_key
              properties:
                license_key:
                  type: string
                  description: Raw contents of the license file.
            example:
              license_key: <license-file-contents>
      responses:
        '200':
          description: License deployed.
  /api/public/license:
    post:
      tags:
      - System
      summary: Public license API (deploy / status / info)
      description: "**Public, no auth required** (since 7.0.0). One endpoint with three behaviors keyed off the `action` discriminator:\n\
        \n- `action: deploy_license` - install a license on a fresh / unlicensed appliance.   Body: `license_key`, `nodeId`,\
        \ `action`. Returns 200 OK on success. This is the   first-time-activation path - once a valid license is deployed,\
        \ prefer the   authenticated `POST /api/auth/license` for renewals.\n- `action: get_status` - poll deployment progress.\
        \ Body: `action` (+ optional   `nodeId` for per-node status; omit for cluster-wide). Returns `depl_status`   (e.g.\
        \ `finished`) plus either `depl_message` (cluster summary) or `depl_info`   (`source`, `user_id`, `ws_session_id`,\
        \ `depl_start_time`) for a single node.\n- `action: get_info` - parse a license key **without** deploying it. Body:\
        \   `license_key`, `action`. Returns `serial_no`, `expiry_time`, `hardware_key`,   `max_users`, `entitlements`, `type`,\
        \ `edition`. For Subscription-type licenses,   `max_users` / `expiry_time` are only populated after deployment (they're\
        \ fetched   from FDN at activation time).\n\n**Auth coverage:** `API-KEY: OK` \xB7 `Bearer JWT: OK`"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - action
              properties:
                action:
                  type: string
                  enum:
                  - deploy_license
                  - get_status
                  - get_info
                  description: Discriminator. See description for the body shape each action expects.
                license_key:
                  type: string
                  description: Raw license file contents. Required for `deploy_license` and `get_info`.
                nodeId:
                  type: string
                  description: Target node id. Required for `deploy_license`; optional for `get_status` (omit -> cluster-wide).
                    Discoverable via `GET /api/auth/license?param=license_details` (`nodes.<id>.node.nodeId`).
            examples:
              deploy_license:
                summary: Deploy on a fresh appliance
                value:
                  action: deploy_license
                  license_key: <license-file-contents>
                  nodeId: 0961991714b6089a1d31983ea76f869e
              get_status:
                summary: Poll deployment progress
                value:
                  action: get_status
                  nodeId: 0961991714b6089a1d31983ea76f869e
              get_info:
                summary: Parse a key without deploying
                value:
                  action: get_info
                  license_key: <license-file-contents>
            example:
              action: get_status
      responses:
        '200':
          description: Action-specific payload. See description.
          content:
            application/json:
              example:
                depl_message: null
                depl_status: finished
      x-verified-live:
      - apikey
      - jwt
  /api/version:
    get:
      tags:
      - System
      summary: Build version
      description: "**Public, no auth required.** Cheap unauthenticated probe.\n\n**Auth coverage:** `API-KEY: OK` \xB7 `Bearer\
        \ JWT: OK`"
      security: []
      responses:
        '200':
          description: Version string.
          content:
            application/json:
              example:
                version: 7.6.5-5662
      x-verified-live:
      - apikey
      - jwt
  /api/permissions/current:
    get:
      tags:
      - Authentication

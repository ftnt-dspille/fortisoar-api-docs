      summary: Global Elasticsearch search
      description: "**See:** [Query reference](#description/query-reference) (`/api/search` section)\n\nCross-module text\
        \ search backed by Elasticsearch. **Min 3 chars** enforced. Team / RBAC scoped automatically (your accessible team\
        \ IRIs are appended to the ES filter). Use this for global-search-bar UX; for deterministic per-entity filtering prefer\
        \ `POST /api/query/<resourceShortName>`.\n\n**Diagnostic gotcha:** this route returns `400 TypeError` when the downstream\
        \ search service is unhealthy, not when the request body is wrong. If you see that error with a well-formed body,\
        \ the search subsystem on the appliance needs attention - the API surface itself is fine.\n\n**Auth coverage:** `API-KEY:\
        \ 400` \xB7 `Bearer JWT: 400`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - q
              - index
              properties:
                q:
                  type: string
                  minLength: 3
                  description: Search term. Server enforces a min-3-character rule and rejects shorter strings.
                index:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  example:
                  - alerts
                  - incidents
                  description: Plural module names to search across. The server intersects this with the caller's accessible
                    types.
                size:
                  type: integer
                  default: 30
                  description: Max hits to return.
                offset:
                  type: integer
                  default: 0
                  description: 0-indexed offset for paging.
                sort:
                  type: string
                  default: _score
                  description: ES sort spec. Defaults to relevance.
                searchType:
                  type: string
                  default: _default
                modifyDateGte:
                  type: integer
                  description: Lower bound on `modifyDate` (epoch). Omit or 0 for unbounded.
                modifyDateLte:
                  type: integer
                  description: Upper bound on `modifyDate` (epoch). Omit or 0 for unbounded.
            example:
              q: fortinet phishing
              index:
              - alerts
              - incidents
              size: 30
      responses:
        '200':
          description: Search payload.
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalItems:
                    type: integer
                    description: ES `total.value` from the underlying search hit count.
                  results:

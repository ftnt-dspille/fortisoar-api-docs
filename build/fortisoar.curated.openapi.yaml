  /api/integration/execute/:
    post:
      tags:
      - Connectors
      summary: Execute a connector action
      description: "Runs a connector operation against a configured connector.\n\n**Body fields** (verified by probing the\
        \ live API):\n- `connector` (required) \u2014 connector `name` (e.g. `hello-world`).\n- `operation` (required) \u2014\
        \ operation key from the connector's `info.json`   (e.g. `reverse_text`). Discover available operations via   `POST\
        \ /api/integration/connectors/{id}/` (response `operations[].operation`).\n- `config` (required when the operation\
        \ needs a configuration) \u2014 accepts **either**   the configuration uuid (`config_id`) **or** the configuration\
        \ `name`.   Stateless operations (e.g. `cyops_utilities` formatters) still accept the field   but ignore its value.\
        \ Omitting or `null` returns `INTEGRATION-12: Could not find a connector   configuration matching the given configuration\
        \ id or name`.\n- `version` (optional) \u2014 connector version. If omitted, the appliance resolves the   installed\
        \ default version. Provide it explicitly when multiple versions are installed.\n- `params` (required when the operation\
        \ declares required parameters) \u2014 the action's   input payload as defined by the connector's `info.json`. Discover\
        \ required params via   the same connector-detail endpoint (`operations[].parameters[]` with `required: true`).\n\n\
        Errors surface as 400 with an `INTEGRATION-*` or `CS-INTEGRATION-*` code in `message`.\n\n**Auth coverage:** `API-KEY:\
        \ OK` \xB7 `Bearer JWT: OK`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - connector
              - operation
              properties:
                connector:
                  type: string
                  description: Connector name (e.g. `hello-world`).
                operation:
                  type: string
                  description: Operation key from the connector's `info.json` (e.g. `reverse_text`).
                config:
                  type: string
                  description: Configuration uuid (`config_id`) **or** configuration `name`. Required when the operation needs
                    a configuration.
                version:
                  type: string
                  description: Connector version (e.g. `1.0.4`). Optional - server resolves a default when omitted.
                params:
                  type: object
                  description: Action input payload. Shape varies per operation; see `operations[].parameters` from the connector
                    detail.
            example:
              config: <uuid>
              connector: hello-world
              operation: reverse_text
              params:
                input_text: live-test
              version: 1.0.4
      responses:
        '200':
          description: Action result.
          content:
            application/json:
              example:
                data:
                  original: live-test
                  reversed: tset-evil
                message: ''
                operation: null
                status: Success
      x-verified-live:
      - apikey
      - jwt

  /api/query/{collection}:
    parameters:
    - name: collection
      in: path
      required: true
      schema:
        type: string
    post:
      tags:
      - Query
      summary: Ad-hoc query (full grammar)
      description: "**See:** [Query reference](#description/query-reference)\n\nFull filter / aggregation grammar over a single\
        \ collection. Grammar: 13 leaf operators, AND/OR nesting, sort, aggregates (`count`, `groupby`, `sum`, `avg`, `min`,\
        \ `max`, ...).\n\nPagination is via query string (`?$limit=&$page=`) - body fields named `page`/`pageSize`/`limit`\
        \ are silently ignored. Always set a stable `sort` so successive pages don't reshuffle.\n\n**Auth coverage:** `API-KEY:\
        \ OK` \xB7 `Bearer JWT: OK`"
      parameters:
      - name: $limit
        in: query
        schema:
          type: integer
          default: 30
          maximum: 5000
      - name: $page
        in: query
        schema:
          type: integer
          default: 1
      - name: $search
        in: query
        description: Combines with body filters as AND.
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryBody'
            examples:
              basic:
                summary: Basic AND filter
                value:
                  logic: AND
                  filters:
                  - field: severity.itemValue
                    operator: in
                    value:
                    - High
                    - Critical
                  - field: status.itemValue
                    operator: neq
                    value: Closed
                  sort:
                  - field: createDate
                    direction: desc
              nested-or:
                summary: Nested AND/OR with date window
                value:
                  logic: AND
                  filters:
                  - field: createDate
                    operator: gte
                    value: 1736380800
                    type: datetime
                  - field: createDate
                    operator: lte
                    value: 1738972800
                    type: datetime
                  - logic: OR
                    filters:
                    - field: severity.itemValue
                      operator: eq
                      value: Critical
                    - field: tags.itemValue
                      operator: in
                      value:
                      - high-fidelity
                      - exec-impersonation
                  sort:
                  - field: modifyDate
                    direction: desc
              aggregate-groupby:
                summary: 'Aggregation: count by severity'
                value:
                  logic: AND
                  filters:
                  - field: createDate
                    operator: gte
                    value: 1735689600
                    type: datetime
                  aggregates:
                  - operator: groupby
                    field: severity.itemValue
                    alias: severity
                  - operator: count
                    field: '*'
                    alias: n
                  sort:
                  - field: n
                    direction: desc
              projection:
                summary: Field projection (hydrate only what you need)
                value:
                  logic: AND
                  filters:
                  - field: status.itemValue
                    operator: eq
                    value: Open
                  aggregates:
                  - operator: fields
                    field: uuid
                    alias: uuid
                  - operator: fields
                    field: name
                    alias: name
                  - operator: fields
                    field: severity.itemValue
                    alias: severity
                  - operator: fields
                    field: createDate
                    alias: createDate
              json-contains:
                summary: JSON containment + existence on a JSON column
                value:
                  logic: AND
                  filters:
                  - field: rawData
                    operator: contains
                    value:
                      sourceProduct: FortiGate
                  - field: rawData.indicators
                    operator: exists
                    value: true
              selectFields:
                summary: Allowlist response fields with __selectFields
                value:
                  logic: AND
                  filters:
                  - field: status.itemValue
                    operator: eq
                    value: Open
                  __selectFields:
                  - id
                  - uuid
                  - name
                  - severity
                  - status
                  - createDate
                  sort:
                  - field: createDate
                    direction: desc
              ignoreFields:
                summary: Denylist response fields with __ignoreFields (export-friendly)
                value:
                  logic: AND
                  filters:
                  - field: createDate
                    operator: gte
                    value: 1735689600
                    type: datetime
                  __ignoreFields:
                  - createDate
                  - createUser
                  - modifyDate
                  - modifyUser
                  - '@settings'
            example:
              filters:
              - field: status.itemValue
                operator: neq
                value: Closed
              logic: AND
              sort:
              - direction: desc
                field: createDate
      responses:
        '200':
          description: Hydra collection of matching records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HydraCollection'
              example:
                '@context': /api/3/contexts/Alert

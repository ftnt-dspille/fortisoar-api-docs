  /api/wf/api/query/workflow_logs/:
    post:
      tags:
      - Workflows
      summary: Query playbook logs (recent + historical)
      description: "POST-body query against the playbook log store. `?logs=all` (default) combines recent and historical;\
        \ `?logs=recent` or `?logs=historical` restrict to one source.\n\nIf the request body is `{\"query\": {}}` (or any\
        \ non-empty body), filtering uses the body's grammar (`logic`, `filters`, `sort`, `aggregates`) \u2014 same shape\
        \ as `POST /api/query/{collection}`. Otherwise URL query params drive the result set.\n\nSupported leaf operators\
        \ for `filters`: `eq`, `neq`, `contains`, `ncontains`, `gte`, `lte`. Filterable fields include `status`, `user`, `tags`,\
        \ `modified`, `name`. `aggregates` supports `groupBy` and `count` over `status`, `user`, `name`, `id`. Logic groups\
        \ (`AND` / `OR`) nest.\n\n**Auth coverage:** `API-KEY: OK` \xB7 `Bearer JWT: OK`"
      parameters:
      - name: logs
        in: query
        schema:
          type: string
          enum:
          - all
          - recent
          - historical
          default: all
        description: Source of the playbook logs to search.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                logic:
                  type: string
                  enum:
                  - AND
                  - OR
                limit:
                  type: integer
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                filters:
                  type: array
                  items:
                    type: object
                aggregates:
                  type: array
                  items:
                    type: object
            examples:
              flat:
                summary: Flat AND with sort
                value:
                  logic: AND
                  limit: 30
                  sort:
                  - field: modified
                    direction: desc
                  filters:
                  - field: status
                    operator: eq
                    value: finished
              nested:
                summary: Nested OR groups
                value:
                  logic: OR
                  limit: 30
                  filters:
                  - logic: OR
                    filters:
                    - field: tags
                      operator: contains
                      value: test
                    - field: tags
                      operator: contains
                      value: testing
                  - logic: AND
                    filters:
                    - field: status
                      operator: eq
                      value: finished
                    - field: status
                      operator: eq
                      value: failed
              aggregate:
                summary: Count grouped by status
                value:
                  logic: AND
                  filters: []
                  aggregates:
                  - operator: groupBy
                    field: status
                  - operator: count
                    field: id
            example:
              filters:
              - field: status
                operator: eq
                value: finished
              limit: 2
              logic: AND
              sort:
              - direction: desc
                field: modified
      responses:
        '200':
          description: Hydra collection of matching log rows.
          content:
            application/json:
              example:
                '@context': /wf/api/query/workflow_logs/context/
                hydra:firstPage: /wf/api/query/workflow_logs/?logs=all
                hydra:itemsPerPage: 10
                hydra:lastPage: /wf/api/query/workflow_logs/?logs=all&offset=0

components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: 'Format: `API-KEY <your_key>` (note the literal space).'
    bearerJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Obtain via `POST /auth/authenticate`.
  schemas:
    IRI:
      type: string
      description: 'Internationalized Resource Identifier - relative URL pointing to a record. Example: /api/3/alerts/028b37fa-bb35-4e3b-8afb-a3274a8cb343.'
      example: /api/3/alerts/028b37fa-bb35-4e3b-8afb-a3274a8cb343
    UUID:
      type: string
      format: uuid
      example: 028b37fa-bb35-4e3b-8afb-a3274a8cb343
    EpochMs:
      type: integer
      format: int64
      description: Milliseconds since Unix epoch (UTC).
    HydraCollection:
      type: object
      description: Standard Hydra paged collection wrapper. `hydra:member` is the array of records; the rest is navigation/pagination
        metadata.
      properties:
        '@context':
          type: string
          example: /api/3/contexts/Alert
        '@id':
          type: string
          example: /api/3/alerts
        '@type':
          type: string
          example: hydra:PagedCollection
        hydra:totalItems:
          type: integer
          example: 1
        hydra:itemsPerPage:
          type: integer
          example: 30
        hydra:nextPage:
          type: string
          example: /api/3/alerts?%24page=2
        hydra:firstPage:
          type: string
        hydra:lastPage:
          type: string
        hydra:member:
          type: array
          items:
            type: object
        hydra:search:
          type: object
          properties:
            '@type':
              type: string
              example: hydra:IriTemplate
            hydra:template:
              type: string
            hydra:variableRepresentation:
              type: string
            hydra:mapping:
              type: array
              items:
                type: object
      required:
      - '@context'
      - '@id'
      - '@type'
      - hydra:member
    QueryBody:
      type: object
      description: Body shape for `POST /api/query/{collection}`. Logic groups, leaf filters, sort, and aggregates - see the
        Query reference in the introduction for full operator semantics.
      properties:
        logic:
          type: string
          enum:
          - AND
          - OR
          description: Top-level logical join. Nest by giving a child filter its own `logic` field.
        filters:
          type: array
          items:
            oneOf:
            - type: object
              description: Leaf filter.
              properties:
                field:
                  type: string
                  example: severity.itemValue
                operator:
                  type: string
                  enum:
                  - eq
                  - neq
                  - lt
                  - lte
                  - gt
                  - gte
                  - in
                  - nin
                  - like
                  - notlike
                  - contains
                  - exists
                  - isnull
                  default: eq
                value: {}
                type:
                  type: string
                  description: Optional explicit type hint (datetime, integer, ...).
              required:
              - field
            - type: object
              description: Nested group - recurse with its own logic + filters.
              properties:
                logic:
                  type: string
                  enum:
                  - AND
                  - OR
                filters:
                  type: array
              required:
              - logic
              - filters
        sort:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              direction:
                type: string
                enum:
                - asc
                - desc
                - ASC
                - DESC
            required:
            - field
            - direction
        aggregates:
          type: array
          items:
            type: object
            properties:
              operator:
                type: string
                enum:
                - fields
                - select
                - count
                - countdistinct
                - groupby
                - distinct
                - sum
                - max
                - min
                - avg
                - median
              field:
                type: string
              alias:
                type: string
            required:
            - operator
            - field
          description: Presence of any operator other than `fields`/`select` flips the response into aggregate mode (rows
            of aggregate values instead of records).
        __selectFields:
          type: array
          items:
            type: string
          description: 'Allowlist of fields to return on each `hydra:member` record. Reduces response size when you only need
            a subset. Mutually exclusive with `__ignoreFields` (use one or the other). Lighter alternative to `aggregates:
            [{operator: fields, ...}]` - doesn''t switch the query into aggregate mode.'
          example:
          - id
          - uuid
          - name
          - severity
          - status
        __ignoreFields:
          type: array
          items:
            type: string
          description: Denylist of fields to strip from each `hydra:member` record. Useful when exporting records and you
            want to drop ownership / audit fields (`createDate`, `createUser`, `modifyDate`, `modifyUser`).
          example:
          - createDate
          - createUser
          - modifyDate
          - modifyUser
    Alert:
      type: object
      description: An Alert record. Field set is illustrative - 127 properties exist on this entity per the Hydra walk; the
        ones below are the most-used. Full list via GET /api/3/contexts/Alert.
      properties:
        '@id':
          $ref: '#/components/schemas/IRI'
        '@type':
          type: string
          example: Alert
        uuid:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          example: Malicious Attachment - Malware.Binary.Vbs
        sourceId:
          type:
          - string
          - 'null'
        source:
          type:
          - string
          - 'null'
          example: FireEye EX - Email MPS
        description:
          type:
          - string
          - 'null'
        type:
          type:
          - string
          - 'null'
          description: IRI to picklist value, e.g. /api/3/picklists/<uuid>.
        severity:
          type:
          - string
          - 'null'
          description: IRI to AlertSeverity picklist value.
        status:
          type:
          - string
          - 'null'
          description: IRI to AlertStatus picklist value.
        assignedTo:
          type:
          - string
          - 'null'
          description: IRI to /api/3/people/<uuid>.
        dueDate:
          type:
          - integer
          - 'null'
          format: int64
        createUser:
          type:
          - object
          - string
          - 'null'
        modifyUser:
          type:
          - string
          - 'null'
        createDate:
          type:
          - integer
          - 'null'
          format: int64
        modifyDate:
          type:
          - integer
          - 'null'
          format: int64
        id:
          type: integer
    RecordLog:
      type: object
      description: One audit event record returned by `POST /api/gateway/audit/activities`.
      properties:
        id:
          type: integer
        transactionDate:
          $ref: '#/components/schemas/EpochMs'
        component:
          type: string
          enum:
          - das
          - crudhub
          - sealab
          - agent
          - sdk
        subComponent:
          type: string
        operation:
          $ref: '#/components/schemas/AuditOperation'
        user:
          type: string
          description: Display name.
        userId:
          type: string
          description: Login id.
        source:
          type: string
          description: Source IP.
        entityUuid:
          $ref: '#/components/schemas/UUID'
        entityType:
          type: string
          example: alerts
        entitySingularName:
          type: string
        title:
          type: string
        displayName:
          type: string
          description: Often dirty - extra whitespace / embedded UUIDs / unrelated text. Sanitize client-side.
        playbookIri:
          type:
          - string
          - 'null'
        playbookName:
          type:
          - string
          - 'null'
        data:
          type: object
        rawData:
          type: object
        linkEntityDetails:
          type: object
        teamIris:
          type: array
          items:
            $ref: '#/components/schemas/IRI'
        userOwnerIris:
          type: array
          items:
            $ref: '#/components/schemas/IRI'
        legacy:
          type: boolean
    AuditOperation:
      type: string
      description: One of 45 valid operation values (per GET /api/gateway/audit/operations on FSR 7.6.5).
      enum:
      - Create
      - Update
      - Delete
      - Bulk Delete
      - Bulk Insert
      - Soft Delete
      - Archival Start
      - Archival Failure
      - Restore
      - Link
      - Unlink
      - Import
      - Update During Import
      - Overwrite During Import
      - Comment
      - Event
      - Trigger
      - Resume
      - Retry
      - Terminate
      - Version Created
      - Version Deleted
      - Login Success
      - Login Failed
      - Log Out
      - Install
      - Uninstall
      - Upgrade
      - AddConfig
      - DeleteConfig
      - UpdateConfig
      - Executed Action
      - Activate
      - Deactivate
      - Validate
      - Replication Failed
      - Publish
      - Clone
      - Revert
      - Collect
      - Start
      - Stop
      - Pre-Processing(Drop)
      - Pre-Processing(Update)
      - Pre-Processing(Fail)
    Error:
      type: object
      description: Hydra error envelope returned by FortiSOAR on validation / lookup / permission failures.
      properties:
        '@context':
          type: string
          example: /api/3/contexts/Error
        '@type':
          type: string
          example: Error
        hydra:title:
          type: string
        hydra:description:
          type: string
    AuthRequest:
      type: object
      required:
      - credentials
      properties:
        credentials:
          type: object
          required:
          - loginid
          - password
          properties:
            loginid:
              type: string
              example: csadmin
            password:
              type: string
              format: password
    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: 'JWT - pass as `Authorization: Bearer <token>` on subsequent requests. Default TTL ~30 min.'
